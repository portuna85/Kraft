version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    groups:
      spring-boot:
        patterns: ["org.springframework.boot:*"]
      resilience4j:
        patterns: ["io.github.resilience4j:*"]

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    groups:
      next:
        patterns: ["next", "react", "react-dom", "@types/react*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /web
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
