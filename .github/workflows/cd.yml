name: CD - Deploy to kraft-server

on:
  workflow_run:
    workflows: [ "CI" ]
    branches: [ main ]
    types: [ completed ]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (commit SHA / tag / branch) to deploy"
        required: true

permissions:
  contents: read
  actions: read
  packages: read

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via Docker Compose
    runs-on: [ self-hosted, linux, x64 ]
    environment: production
    timeout-minutes: 20
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      DOCKER_BUILDKIT: '1'
      COMPOSE_DOCKER_CLI_BUILD: '1'
      COMPOSE_FILE: 'docker-compose.yml'

    steps:
      - name: Resolve deploy ref
        id: ref
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            workflow_run)    value="${{ github.event.workflow_run.head_sha }}" ;;
            workflow_dispatch) value="${{ github.event.inputs.ref }}" ;;
            *)               value="${{ github.sha }}" ;;
          esac
          echo "value=$value" >> "$GITHUB_OUTPUT"

      - name: Verify deployment prerequisites
        run: |
          set -euo pipefail
          command -v jq >/dev/null 2>&1            || { echo "::error::jq is not installed"; exit 1; }
          docker compose version >/dev/null 2>&1   || { echo "::error::docker compose plugin is not available"; exit 1; }

      - name: Fix workspace permissions (self-hosted)
        run: sudo chown -R "$USER":"$USER" "$GITHUB_WORKSPACE" || true

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.ref.outputs.value }}

      - name: Make deploy scripts executable
        run: chmod +x scripts/deploy/*.sh

      - name: Verify prod profile resources exist in source
        run: |
          set -euo pipefail
          test -f src/main/resources/application.yml
          test -f src/main/resources/application-local.yml
          test -f src/main/resources/application-prod.yml

      - name: Validate & mask production secrets
        env:
          ALL_SECRETS_JSON: ${{ toJson(secrets) }}
          KRAFT_ADMIN_ENABLED: ${{ vars.KRAFT_ADMIN_ENABLED }}
          KRAFT_ADMIN_PASSWORD: ${{ secrets.KRAFT_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          ./scripts/deploy/validate-env.sh
          while IFS= read -r name; do
            [ -z "$name" ] && continue
            value="$(printf '%s' "$ALL_SECRETS_JSON" | jq -r --arg key "$name" '.[$key] // ""')"
            [ -z "$value" ] && continue
            printf '::add-mask::%s\n' "$value"
          done < .required-envs

      - name: Render .env
        env:
          ALL_SECRETS_JSON: ${{ toJson(secrets) }}
          KRAFT_DB_NAME: ${{ secrets.KRAFT_DB_NAME }}
          KRAFT_APP_IMAGE_TAG: ${{ steps.ref.outputs.value }}
          KRAFT_ADMIN_ENABLED: ${{ vars.KRAFT_ADMIN_ENABLED }}
          KRAFT_ADMIN_PASSWORD: ${{ secrets.KRAFT_ADMIN_PASSWORD }}
        run: ./scripts/deploy/render-env.sh

      - name: Render Alertmanager config
        env:
          ALERTMANAGER_DISCORD_WEBHOOK_URL: ${{ secrets.ALERTMANAGER_DISCORD_WEBHOOK_URL }}
        run: ./scripts/deploy/render-alertmanager.sh

      - name: Validate Docker Compose file
        run: docker compose config -q

      - name: Prepare logs directory for bind mount
        run: ./scripts/deploy/prepare-logs.sh

      # C-1: GHCR에서 CI가 빌드한 이미지를 pull한다 (prod 호스트 재빌드 없음)
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch Flyway history (V15-V25 → V2-V12)
        run: ./scripts/deploy/patch-flyway-history.sh

      - name: Pull & restart services
        env:
          KRAFT_APP_IMAGE_REF: ghcr.io/portuna85/kraft-lotto-app
          KRAFT_APP_IMAGE_TAG: ${{ steps.ref.outputs.value }}
        run: ./scripts/deploy/pull-and-up.sh

      - name: Verify prod profile env in container
        run: |
          set -euo pipefail
          PROFILE="$(docker compose exec -T app sh -lc 'printenv SPRING_PROFILES_ACTIVE')"
          echo "SPRING_PROFILES_ACTIVE=$PROFILE"
          test "$PROFILE" = "prod"

      - name: Wait for app readiness
        run: ./scripts/deploy/wait-readiness.sh

      - name: Rollback on readiness failure
        if: failure()
        run: ./scripts/deploy/rollback.sh

      - name: Smoke test
        run: ./scripts/deploy/smoke-test.sh

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "### Deployment summary"
            echo ""
            echo "- ref: \`${{ steps.ref.outputs.value }}\`"
            echo "- event: \`${{ github.event_name }}\`"
            echo "- status: \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # C-7: self-hosted 디스크 정리 — 사용 가능 공간이 5 GB 미만일 때만 실행
      - name: Prune unused Docker resources
        if: always()
        run: |
          avail=$(df --output=avail -BG / | tail -1 | tr -d 'G ')
          if [ "${avail:-99}" -lt 5 ]; then
            docker image prune -f || true
            docker builder prune -f || true
          fi

      - name: Cleanup secrets artifacts
        if: always()
        run: rm -f .env .required-envs deploy-state/alertmanager.yml
