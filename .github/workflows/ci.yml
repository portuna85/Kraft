name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 최소 권한 기본값 — publish 잡들만 잡 단위로 필요한 권한을 상향한다.
permissions:
  contents: read

jobs:
  backend-build-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: "25"
          distribution: temurin
          cache: gradle
      - name: Build, test & verify coverage
        run: ./gradlew check bootJar -PstrictCoverage=true --no-daemon
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-test-results
          path: build/reports/tests/
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-coverage-report
          path: build/reports/jacoco/

  web-build-test:
    name: Web Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run test:coverage
      - run: npm run build
        env:
          KRAFT_BACKEND_INTERNAL_URL: http://localhost:8080
          KRAFT_PUBLIC_BASE_URL: http://localhost

  web-e2e:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [web-build-test]
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
        env:
          KRAFT_BACKEND_INTERNAL_URL: http://127.0.0.1:59999
          KRAFT_PUBLIC_BASE_URL: http://127.0.0.1:3100
          NEXT_PUBLIC_UNDO_WINDOW_MS: "200"
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  # §6-2: web-e2e와 별도 트랙 — 백엔드가 없다는 전제(web-e2e)가 아니라 픽스처 백엔드로
  # 실제 콘텐츠가 렌더된 상태의 반응형 오버플로를 검증한다. web-e2e와 완전히 분리된
  # Playwright 설정(playwright.content.config.ts, 앱/픽스처 포트도 다름)이라 서로 간섭하지 않는다.
  web-e2e-content:
    name: Web E2E Content (§6-2 픽스처 백엔드)
    runs-on: ubuntu-latest
    needs: [web-build-test]
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
        env:
          KRAFT_BACKEND_INTERNAL_URL: http://127.0.0.1:4101
          KRAFT_PUBLIC_BASE_URL: http://127.0.0.1:3101
          NEXT_PUBLIC_UNDO_WINDOW_MS: "200"
      - run: npm run test:e2e:content
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report-content
          path: web/playwright-report/
          retention-days: 7

  # §6-5: 하단 고정 광고가 CTA·푸터를 가리지 않는지 검증하려면 광고 env가 baked-in된
  # 별도 빌드가 필요하다. NEXT_DIST_DIR로 산출물 디렉터리를 분리해 web-e2e/web-e2e-content
  # 잡과 겹치지 않게 한다(어차피 잡마다 별도 체크아웃이라 로컬처럼 실제로 꼬일 일은 없지만,
  # 스크립트 동작을 로컬과 동일하게 유지한다). 백엔드는 필요 없다 — 광고는 루트 레이아웃에
  # 있어 모든 라우트에서 mount된다.
  web-e2e-ad-overlay:
    name: Web E2E Ad Overlay (§6-5)
    runs-on: ubuntu-latest
    needs: [web-build-test]
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
        env:
          NEXT_DIST_DIR: .next-ad-overlay
          NEXT_PUBLIC_KAKAO_ADFIT_UNIT_STICKY: DAN-ci-ad-overlay-test
          KRAFT_BACKEND_INTERNAL_URL: http://127.0.0.1:59999
          KRAFT_PUBLIC_BASE_URL: http://127.0.0.1:3103
      - run: npm run test:e2e:ad-overlay
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report-ad-overlay
          path: web/playwright-report/
          retention-days: 7

  # runs fully parallel — Gradle dep cache is enough; compiled classes aren't shared between jobs anyway
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: "25"
          distribution: temurin
          cache: gradle
      - name: SpotBugs + Checkstyle
        run: ./gradlew check -PstrictStatic=true --no-daemon -x test

  caddy-validate:
    name: Caddy Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Validate Caddyfile
        run: |
          docker run --rm \
            -v "$PWD/caddy:/etc/caddy" \
            -e KRAFT_DOMAIN=kraft.io.kr \
            -e KRAFT_ADMIN_DOMAIN=admin.kraft.io.kr \
            caddy:2-alpine@sha256:77c07d5ebfa5be9fd6c820d2094ae662c9e7eeb9bf98346b7f639900263ee2a2 \
            caddy validate --config /etc/caddy/Caddyfile

  removed-feature-guard:
    name: Removed Feature Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Check no removed features
        run: bash scripts/check-no-removed-features.sh

  docker-publish-backend:
    name: Docker Publish (backend)
    runs-on: ubuntu-latest
    needs: [backend-build-test, static-analysis, caddy-validate]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Verify required secrets
        env:
          CHECK_DB_PASSWORD:        ${{ secrets.KRAFT_DB_PASSWORD }}
          CHECK_REVALIDATE_SECRET:  ${{ secrets.KRAFT_REVALIDATE_SECRET }}
          CHECK_OPS_TOKEN:          ${{ secrets.KRAFT_OPS_TOKEN }}
        run: |
          missing=()
          [ -z "$CHECK_DB_PASSWORD" ]       && missing+=("KRAFT_DB_PASSWORD")
          [ -z "$CHECK_REVALIDATE_SECRET" ] && missing+=("KRAFT_REVALIDATE_SECRET")
          [ -z "$CHECK_OPS_TOKEN" ]         && missing+=("KRAFT_OPS_TOKEN")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Required secrets are missing: ${missing[*]}"
            exit 1
          fi
          echo "All required secrets are present."
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set lowercase repo name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build & push backend
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/backend:${{ github.sha }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  docker-publish-web:
    name: Docker Publish (web)
    runs-on: ubuntu-latest
    needs: [web-build-test, caddy-validate]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set lowercase repo name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build & push web
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: web
          file: web/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/web:${{ github.sha }}
          build-args: |
            KRAFT_PUBLIC_BASE_URL=${{ secrets.KRAFT_PUBLIC_BASE_URL }}
            NEXT_PUBLIC_NAVER_SITE_VERIFICATION=${{ secrets.NEXT_PUBLIC_NAVER_SITE_VERIFICATION }}
            NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION=${{ secrets.NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION }}
            NEXT_PUBLIC_KAKAO_ADFIT_UNIT_FREQUENCY=${{ secrets.NEXT_PUBLIC_KAKAO_ADFIT_UNIT_FREQUENCY }}
            NEXT_PUBLIC_KAKAO_ADFIT_UNIT_FREQUENCY_DESKTOP=${{ secrets.NEXT_PUBLIC_KAKAO_ADFIT_UNIT_FREQUENCY_DESKTOP }}
            NEXT_PUBLIC_KAKAO_ADFIT_UNIT_STICKY=${{ secrets.NEXT_PUBLIC_KAKAO_ADFIT_UNIT_STICKY }}
            NEXT_PUBLIC_AD_NETWORK=${{ vars.NEXT_PUBLIC_AD_NETWORK || 'adfit' }}
            NEXT_PUBLIC_ADSENSE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_ADSENSE_CLIENT_ID }}
            NEXT_PUBLIC_ADSENSE_UNIT_SIDEBAR=${{ secrets.NEXT_PUBLIC_ADSENSE_UNIT_SIDEBAR }}
            NEXT_PUBLIC_ADSENSE_UNIT_FREQUENCY=${{ secrets.NEXT_PUBLIC_ADSENSE_UNIT_FREQUENCY }}
            NEXT_PUBLIC_ADSENSE_UNIT_FREQUENCY_MOBILE=${{ secrets.NEXT_PUBLIC_ADSENSE_UNIT_FREQUENCY_MOBILE }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  security-scan-backend:
    name: Security Scan (backend)
    runs-on: ubuntu-latest
    needs: docker-publish-backend
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set lowercase repo name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Trivy scan (block on HIGH/CRITICAL with fix)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ env.REPO_LC }}/backend:${{ github.sha }}
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Trivy scan (report MEDIUM)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ env.REPO_LC }}/backend:${{ github.sha }}
          exit-code: "0"
          severity: MEDIUM

  security-scan-web:
    name: Security Scan (web)
    runs-on: ubuntu-latest
    needs: docker-publish-web
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set lowercase repo name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Trivy scan (block on HIGH/CRITICAL with fix)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ env.REPO_LC }}/web:${{ github.sha }}
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Trivy scan (report MEDIUM)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ env.REPO_LC }}/web:${{ github.sha }}
          exit-code: "0"
          severity: MEDIUM

  promote:
    name: Promote to latest
    runs-on: ubuntu-latest
    needs: [security-scan-backend, security-scan-web, removed-feature-guard]
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write
    steps:
      - name: Set lowercase repo name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Promote backend to latest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ env.REPO_LC }}/backend:latest \
            ghcr.io/${{ env.REPO_LC }}/backend:${{ github.sha }}
      - name: Promote web to latest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ env.REPO_LC }}/web:latest \
            ghcr.io/${{ env.REPO_LC }}/web:${{ github.sha }}
