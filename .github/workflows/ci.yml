name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-build-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: temurin
          cache: gradle
      - name: Build & test
        run: ./gradlew test bootJar -PstrictCoverage=true --no-daemon
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: backend-test-results
          path: build/reports/tests/

  web-build-test:
    name: Web Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
        env:
          KRAFT_BACKEND_INTERNAL_URL: http://localhost:8080
          KRAFT_PUBLIC_BASE_URL: http://localhost

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: backend-build-test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: temurin
          cache: gradle
      - name: SpotBugs + Checkstyle
        run: ./gradlew check -PstrictStatic=true --no-daemon -x test

  caddy-validate:
    name: Caddy Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate Caddyfile
        run: |
          docker run --rm \
            -v "$PWD/caddy:/etc/caddy" \
            -e KRAFT_DOMAIN=kraft.io.kr \
            -e KRAFT_ADMIN_DOMAIN=admin.kraft.io.kr \
            caddy:latest caddy validate --config /etc/caddy/Caddyfile

  removed-feature-guard:
    name: Removed Feature Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check no removed features
        run: bash scripts/check-no-removed-features.sh

  docker-publish:
    name: Docker Publish
    runs-on: ubuntu-latest
    needs: [backend-build-test, web-build-test, static-analysis, caddy-validate]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Verify required secrets
        env:
          CHECK_DB_URL: ${{ secrets.KRAFT_DB_URL }}
          CHECK_DB_USERNAME: ${{ secrets.KRAFT_DB_USERNAME }}
          CHECK_DB_PASSWORD: ${{ secrets.KRAFT_DB_PASSWORD }}
          CHECK_REVALIDATE_SECRET: ${{ secrets.KRAFT_REVALIDATE_SECRET }}
          CHECK_OPS_TOKEN: ${{ secrets.KRAFT_OPS_TOKEN }}
        run: |
          missing=()
          [ -z "$CHECK_DB_URL" ]            && missing+=("KRAFT_DB_URL")
          [ -z "$CHECK_DB_USERNAME" ]       && missing+=("KRAFT_DB_USERNAME")
          [ -z "$CHECK_DB_PASSWORD" ]       && missing+=("KRAFT_DB_PASSWORD")
          [ -z "$CHECK_REVALIDATE_SECRET" ] && missing+=("KRAFT_REVALIDATE_SECRET")
          [ -z "$CHECK_OPS_TOKEN" ]         && missing+=("KRAFT_OPS_TOKEN")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Required secrets are missing: ${missing[*]}"
            exit 1
          fi
          echo "All required secrets are present."
      - uses: actions/checkout@v6
      - name: Set lowercase repo name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build & push backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/backend:${{ github.sha }}
      - name: Build & push web
        uses: docker/build-push-action@v7
        with:
          context: web
          file: web/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/web:${{ github.sha }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: docker-publish
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Set lowercase repo name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Trivy scan backend (block on HIGH/CRITICAL with fix)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.REPO_LC }}/backend:${{ github.sha }}
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Trivy scan backend (report MEDIUM)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.REPO_LC }}/backend:${{ github.sha }}
          exit-code: "0"
          severity: MEDIUM
      - name: Trivy scan web (block on HIGH/CRITICAL with fix)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.REPO_LC }}/web:${{ github.sha }}
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Trivy scan web (report MEDIUM)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.REPO_LC }}/web:${{ github.sha }}
          exit-code: "0"
          severity: MEDIUM

  promote:
    name: Promote to latest
    runs-on: ubuntu-latest
    needs: [security-scan, removed-feature-guard]
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write
    steps:
      - name: Set lowercase repo name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Promote backend
        run: |
          docker pull ghcr.io/${{ env.REPO_LC }}/backend:${{ github.sha }}
          docker tag ghcr.io/${{ env.REPO_LC }}/backend:${{ github.sha }} \
                     ghcr.io/${{ env.REPO_LC }}/backend:latest
          docker push ghcr.io/${{ env.REPO_LC }}/backend:latest
      - name: Promote web
        run: |
          docker pull ghcr.io/${{ env.REPO_LC }}/web:${{ github.sha }}
          docker tag ghcr.io/${{ env.REPO_LC }}/web:${{ github.sha }} \
                     ghcr.io/${{ env.REPO_LC }}/web:latest
          docker push ghcr.io/${{ env.REPO_LC }}/web:latest
