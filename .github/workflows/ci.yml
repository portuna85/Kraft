name: CI

on:
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'temurin'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true'
  TRIVY_VERSION: 'v0.70.0'
  SYFT_VERSION: 'v1.24.0'
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/portuna85/kraft-lotto-app

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Validate UTF-8 text files
        run: python3 scripts/check_utf8.py

      # check = test (incl. FlywayMigrationIntegrationTest) + checkstyle + spotbugs
      # test finalizedBy jacocoTestReport
      - name: Build + Test + Static analysis + Coverage
        run: |
          ./gradlew check bootJar -PstrictStatic=true -PstrictCoverage=true

      - name: Verify prod profile resources packaged in jar
        run: |
          set -euo pipefail
          count=$(unzip -l build/libs/app.jar \
            | grep -cE 'BOOT-INF/classes/application(-(prod|local))?\.yml')
          if [ "$count" -ne 3 ]; then
            echo "::error::expected 3 application*.yml entries in jar, found $count"
            exit 1
          fi

      - name: Upload app jar
        uses: actions/upload-artifact@v7
        with:
          name: app-jar-${{ github.run_id }}
          path: build/libs/app.jar
          retention-days: 1

      # C-3: PR 공급망 보안 스캔 (머지 전 의존성 회귀 차단)
      - name: PR dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      - name: PR Trivy filesystem scan
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@0.31.0
        with:
          scan-type: fs
          scan-ref: build/libs/app.jar
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Cache Trivy binary
        if: github.event_name != 'pull_request'
        id: trivy-cache
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/bin/trivy
          key: trivy-${{ env.TRIVY_VERSION }}-linux-amd64

      - name: Install Trivy CLI
        if: github.event_name != 'pull_request' && steps.trivy-cache.outputs.cache-hit != 'true'
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          VERSION="${TRIVY_VERSION#v}"
          curl -fsSL --no-progress-meter \
            "https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/trivy_${VERSION}_Linux-64bit.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP/bin" trivy

      - name: Add tool bin to PATH
        if: github.event_name != 'pull_request'
        run: echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Scan JAR for vulnerabilities (Trivy CLI)
        if: github.event_name != 'pull_request'
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        run: |
          set -euo pipefail
          trivy fs build/libs/app.jar \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0

      - name: Cache Syft binary
        if: github.event_name != 'pull_request'
        id: syft-cache
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/bin/syft
          key: syft-${{ env.SYFT_VERSION }}-linux-amd64

      - name: Install Syft CLI
        if: github.event_name != 'pull_request' && steps.syft-cache.outputs.cache-hit != 'true'
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          VERSION="${SYFT_VERSION#v}"
          curl -fsSL --no-progress-meter \
            "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/syft_${VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP/bin" syft

      - name: Generate SBOM (Syft CLI)
        if: github.event_name != 'pull_request'
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        run: |
          set -euo pipefail
          syft scan build/libs/ -o cyclonedx-json=sbom.json

      - name: Upload SBOM
        if: github.event_name != 'pull_request'
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ github.run_id }}
          path: sbom.json
          retention-days: 14

      # C-1: CI 빌드 산출물을 GHCR에 push (main push 시에만)
      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image to GHCR
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        id: docker-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      # C-5: 빌드 프로비넌스 어테스테이션 — jar + 이미지
      - name: Attest jar provenance
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: build/libs/app.jar

      - name: Attest image provenance
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.docker-push.outputs.digest }}
          push-to-registry: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-${{ github.run_id }}
          path: |
            build/reports/tests/
            build/test-results/
          retention-days: 14

      - name: Upload static analysis report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: static-analysis-report-${{ github.run_id }}
          path: |
            build/reports/checkstyle/
            build/reports/spotbugs/
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ github.run_id }}
          path: |
            build/reports/jacoco/test/html/
            build/reports/jacoco/test/jacocoTestReport.xml
          retention-days: 14

  e2e-smoke:
    name: E2E Smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: build-test
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Restore npm cache
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - name: Download app jar
        uses: actions/download-artifact@v5
        with:
          name: app-jar-${{ github.run_id }}
          path: build/libs/

      - name: Install E2E dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run Playwright smoke tests
        env:
          KRAFT_E2E_JAR_PATH: build/libs/app.jar
        run: npm run test:e2e

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-artifacts-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  performance-smoke:
    name: Performance Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-test
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run performance smoke tests
        run: ./gradlew performanceSmokeTest

      - name: Upload performance smoke report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: performance-smoke-report-${{ github.run_id }}
          path: |
            build/reports/tests/performanceSmokeTest/
            build/test-results/performanceSmokeTest/
          retention-days: 14
