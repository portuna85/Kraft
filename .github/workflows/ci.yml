name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
  schedule:
    - cron: '0 2 * * 1'  # 매주 월요일 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'temurin'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true'
  TRIVY_VERSION: 'v0.70.0'
  SYFT_VERSION: 'v1.24.0'
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/portuna85/kraft-lotto-app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Validate UTF-8 text files
        run: python3 scripts/check_utf8.py

      - name: Validate Caddyfile
        run: |
          docker run --rm \
            -e KRAFT_DOMAIN=example.com \
            -e KRAFT_ADMIN_DOMAIN=admin.example.com \
            -v "$PWD/docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine \
            caddy validate --config /etc/caddy/Caddyfile

      - name: Check environment drift
        run: python3 scripts/check_env_drift.py

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install CSS build dependencies
        run: npm ci --ignore-scripts

      - name: Minify CSS (F-2)
        run: npm run build:css

      - name: Validate frontend JavaScript syntax
        run: npm run check:js

      - name: Run frontend unit tests (Vitest)
        run: npm run test:unit

      - name: Verify CSS build has no uncommitted diff
        run: git diff --exit-code -- src/main/resources/static/css

      # SpotBugs·Checkstyle은 static-analysis 잡으로 분리 — 크리티컬 패스에서 제외
      - name: Build + Test + Coverage
        run: |
          ./gradlew test bootJar jacocoTestReport -PstrictCoverage=true

      - name: Verify prod profile resources packaged in jar
        run: |
          set -euo pipefail
          count=$(unzip -l build/libs/app.jar \
            | grep -cE 'BOOT-INF/classes/application(-(prod|local))?\.yml')
          if [ "$count" -ne 3 ]; then
            echo "::error::expected 3 application*.yml entries in jar, found $count"
            exit 1
          fi

      - name: Upload app jar
        uses: actions/upload-artifact@v7
        with:
          name: app-jar-${{ github.run_id }}
          path: build/libs/app.jar
          retention-days: 1

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-${{ github.run_id }}
          path: |
            build/reports/tests/
            build/test-results/
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ github.run_id }}
          path: |
            build/reports/jacoco/test/html/
            build/reports/jacoco/test/jacocoTestReport.xml
          retention-days: 14

  # Docker 빌드·push·어테스테이션을 크리티컬 패스에서 분리 — e2e-smoke, security-scan과 병렬 실행
  docker-publish:
    name: Docker Publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-test
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download app jar
        uses: actions/download-artifact@v8
        with:
          name: app-jar-${{ github.run_id }}
          path: build/libs/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image to GHCR
        id: docker-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ci
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # C-5: 빌드 프로비넌스 어테스테이션 (rekor.sigstore.dev 네트워크 장애 시 비차단)
      - name: Attest jar provenance
        uses: actions/attest-build-provenance@v4
        continue-on-error: true
        with:
          subject-path: build/libs/app.jar

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v4
        continue-on-error: true
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.docker-push.outputs.digest }}
          push-to-registry: true

  # SpotBugs + Checkstyle — build-test 크리티컬 패스에서 분리, docker-publish·e2e-smoke·security-scan과 병렬 실행
  static-analysis:
    name: Static Analysis (SpotBugs + Checkstyle)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: SpotBugs + Checkstyle
        run: |
          ./gradlew spotbugsMain spotbugsTest checkstyleMain checkstyleTest -PstrictStatic=true

      - name: Upload static analysis report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: static-analysis-report-${{ github.run_id }}
          path: |
            build/reports/checkstyle/
            build/reports/spotbugs/
          retention-days: 14

  e2e-smoke:
    name: E2E Smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: build-test
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Restore npm cache
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - name: Download app jar
        uses: actions/download-artifact@v8
        with:
          name: app-jar-${{ github.run_id }}
          path: build/libs/

      - name: Install E2E dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run Playwright smoke tests
        env:
          KRAFT_E2E_JAR_PATH: build/libs/app.jar
        run: npm run test:e2e

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-artifacts-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  # Trivy + Syft를 build-test 크리티컬 패스에서 분리 — docker-publish 완료 후 이미지 스캔
  security-scan:
    name: Security Scan (Trivy + SBOM)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-test, docker-publish]

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Trivy binary
        id: trivy-cache
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/bin/trivy
          key: trivy-${{ env.TRIVY_VERSION }}-linux-amd64

      - name: Install Trivy CLI
        if: steps.trivy-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          VERSION="${TRIVY_VERSION#v}"
          curl -fsSL --no-progress-meter \
            "https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/trivy_${VERSION}_Linux-64bit.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP/bin" trivy

      - name: Add tool bin to PATH
        run: echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Scan image for vulnerabilities (Trivy CLI)
        run: |
          set -euo pipefail
          trivy image "${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --skip-files usr/bin/pebble \
            --exit-code 1

      - name: Cache Syft binary
        id: syft-cache
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/bin/syft
          key: syft-${{ env.SYFT_VERSION }}-linux-amd64

      - name: Install Syft CLI
        if: steps.syft-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          VERSION="${SYFT_VERSION#v}"
          curl -fsSL --no-progress-meter \
            "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/syft_${VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP/bin" syft

      - name: Generate SBOM (Syft CLI)
        run: |
          set -euo pipefail
          syft scan "${{ env.IMAGE_NAME }}:${{ github.sha }}" -o cyclonedx-json=sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ github.run_id }}
          path: sbom.json
          retention-days: 14

  # SHA→latest 프로모션 — e2e-smoke, static-analysis, security-scan 전부 성공 후 실행
  promote:
    name: Promote SHA → latest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [e2e-smoke, static-analysis, security-scan]
    permissions:
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag SHA as latest
        run: |
          docker pull "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker tag  "${{ env.IMAGE_NAME }}:${{ github.sha }}" "${{ env.IMAGE_NAME }}:latest"
          docker push "${{ env.IMAGE_NAME }}:latest"

  performance-smoke:
    name: Performance Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-test
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run performance smoke tests
        run: ./gradlew performanceSmokeTest

      - name: Upload performance smoke report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: performance-smoke-report-${{ github.run_id }}
          path: |
            build/reports/tests/performanceSmokeTest/
            build/test-results/performanceSmokeTest/
          retention-days: 14

  # Lighthouse CI — 주 1회 schedule 또는 workflow_dispatch 시 실행
  # performance.spec.js 의 Playwright Lighthouse 테스트를 재사용 (score >= 0.85 기준)
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-test
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Restore npm cache
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - name: Download app jar
        uses: actions/download-artifact@v8
        with:
          name: app-jar-${{ github.run_id }}
          path: build/libs/

      - name: Install E2E dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run Lighthouse performance test
        env:
          KRAFT_E2E_JAR_PATH: build/libs/app.jar
        run: npx playwright test tests/e2e/performance.spec.js --project=chromium

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 30

  # Flyway 마이그레이션 검증 — MariaDB 실제 DB로 스키마 무결성 확인
  migration-validate:
    name: Flyway Migration Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-test

    services:
      mariadb:
        image: mariadb:11.7
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: kraft_lotto_ci
          MARIADB_USER: kraft
          MARIADB_PASSWORD: kraft
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Flyway CLI
        run: |
          curl -sL https://download.red-gate.com/maven/release/com/redgate/flyway/flyway-commandline/11.8.2/flyway-commandline-11.8.2-linux-x64.tar.gz \
            | tar xz -C /tmp
          echo "/tmp/flyway-11.8.2" >> $GITHUB_PATH

      - name: Download MariaDB JDBC driver for Flyway CLI
        run: |
          curl -sL https://repo1.maven.org/maven2/org/mariadb/jdbc/mariadb-java-client/3.5.3/mariadb-java-client-3.5.3.jar \
            -o /tmp/flyway-11.8.2/drivers/mariadb-java-client.jar

      - name: Run Flyway migration + validate against MariaDB
        run: |
          flyway migrate validate \
            -url=jdbc:mariadb://localhost:3306/kraft_lotto_ci \
            -user=kraft \
            -password=kraft \
            -locations=filesystem:src/main/resources/db/migration,filesystem:src/main/resources/db/vendor/mariadb
