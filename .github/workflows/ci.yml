name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'temurin'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true'

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Validate UTF-8 text files
        run: python3 scripts/check_utf8.py

      # check = test (incl. FlywayMigrationIntegrationTest) + checkstyle + spotbugs
      # test finalizedBy jacocoTestReport
      - name: Build + Test + Static analysis + Coverage
        run: |
          ./gradlew check bootJar -PstrictStatic=true -PstrictCoverage=true

      - name: Verify prod profile resources packaged in jar
        run: |
          set -euo pipefail
          count=$(unzip -l build/libs/app.jar \
            | grep -cE 'BOOT-INF/classes/application(-(prod|local))?\.yml')
          if [ "$count" -ne 3 ]; then
            echo "::error::expected 3 application*.yml entries in jar, found $count"
            exit 1
          fi

      - name: Upload app jar
        uses: actions/upload-artifact@v4
        with:
          name: app-jar-${{ github.run_id }}
          path: build/libs/app.jar
          retention-days: 1

      - name: Scan JAR for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: build/libs/app.jar
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          path: build/libs/
          format: cyclonedx-json
          output-file: sbom.json
          artifact-name: sbom-${{ github.run_id }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_id }}
          path: |
            build/reports/tests/
            build/test-results/
          retention-days: 14

      - name: Upload static analysis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-report-${{ github.run_id }}
          path: |
            build/reports/checkstyle/
            build/reports/spotbugs/
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_id }}
          path: |
            build/reports/jacoco/test/html/
            build/reports/jacoco/test/jacocoTestReport.xml
          retention-days: 14

  e2e-smoke:
    name: E2E Smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install E2E dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start app (test profile)
        env:
          SPRING_PROFILES_ACTIVE: test
          KRAFT_SKIP_REQUIRED_CONFIG_VALIDATOR: true
        run: |
          ./gradlew bootRun > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/actuator/health/readiness >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "::error::app did not become ready in time"
          tail -n 200 app.log || true
          exit 1

      - name: Run Playwright smoke tests
        run: npm run test:e2e

      - name: Stop app
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-${{ github.run_id }}
          path: |
            app.log
            test-results/
            playwright-report/
          retention-days: 14

  performance-smoke:
    name: Performance Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-test
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run performance smoke tests
        run: ./gradlew performanceSmokeTest

      - name: Upload performance smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-smoke-report-${{ github.run_id }}
          path: |
            build/reports/tests/performanceSmokeTest/
            build/test-results/performanceSmokeTest/
          retention-days: 14
