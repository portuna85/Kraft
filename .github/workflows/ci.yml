name: CI

on:
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'temurin'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true'
  TRIVY_VERSION: 'v0.64.1'
  SYFT_VERSION: 'v1.24.0'

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Validate UTF-8 text files
        run: python3 scripts/check_utf8.py

      # check = test (incl. FlywayMigrationIntegrationTest) + checkstyle + spotbugs
      # test finalizedBy jacocoTestReport
      - name: Build + Test + Static analysis + Coverage
        run: |
          ./gradlew check bootJar -PstrictStatic=true -PstrictCoverage=true

      - name: Verify prod profile resources packaged in jar
        run: |
          set -euo pipefail
          count=$(unzip -l build/libs/app.jar \
            | grep -cE 'BOOT-INF/classes/application(-(prod|local))?\.yml')
          if [ "$count" -ne 3 ]; then
            echo "::error::expected 3 application*.yml entries in jar, found $count"
            exit 1
          fi

      - name: Upload app jar
        uses: actions/upload-artifact@v4
        with:
          name: app-jar-${{ github.run_id }}
          path: build/libs/app.jar
          retention-days: 1

      - name: Install Trivy CLI
        if: github.event_name != 'pull_request'
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          for i in 1 2 3; do
            version="${TRIVY_VERSION#v}"
            pkg="trivy_${version}_Linux-64bit.tar.gz"
            url="https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/${pkg}"
            curl -fsSLo "$RUNNER_TEMP/$pkg" "$url"
            tar -xzf "$RUNNER_TEMP/$pkg" -C "$RUNNER_TEMP/bin" trivy && break
            sleep $((i * 2))
          done
          trivy --version

      - name: Scan JAR for vulnerabilities (Trivy CLI)
        if: github.event_name != 'pull_request'
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        run: |
          set -euo pipefail
          trivy fs build/libs/app.jar \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0

      - name: Install Syft CLI
        if: github.event_name != 'pull_request'
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          for i in 1 2 3; do
            version="${SYFT_VERSION#v}"
            pkg="syft_${version}_linux_amd64.tar.gz"
            url="https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/${pkg}"
            curl -fsSLo "$RUNNER_TEMP/$pkg" "$url"
            tar -xzf "$RUNNER_TEMP/$pkg" -C "$RUNNER_TEMP/bin" syft && break
            sleep $((i * 2))
          done
          syft version

      - name: Generate SBOM (Syft CLI)
        if: github.event_name != 'pull_request'
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        run: |
          set -euo pipefail
          syft scan build/libs/ -o cyclonedx-json=sbom.json

      - name: Upload SBOM
        if: github.event_name != 'pull_request'
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.run_id }}
          path: sbom.json
          retention-days: 14

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_id }}
          path: |
            build/reports/tests/
            build/test-results/
          retention-days: 14

      - name: Upload static analysis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-report-${{ github.run_id }}
          path: |
            build/reports/checkstyle/
            build/reports/spotbugs/
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_id }}
          path: |
            build/reports/jacoco/test/html/
            build/reports/jacoco/test/jacocoTestReport.xml
          retention-days: 14

  e2e-smoke:
    name: E2E Smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-test
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Install E2E dependencies
        run: |
          npm ci --prefer-offline --no-audit

      - name: Run Playwright smoke tests
        run: npm run test:e2e

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          retention-days: 14

  performance-smoke:
    name: Performance Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-test
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run performance smoke tests
        run: ./gradlew performanceSmokeTest

      - name: Upload performance smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-smoke-report-${{ github.run_id }}
          path: |
            build/reports/tests/performanceSmokeTest/
            build/test-results/performanceSmokeTest/
          retention-days: 14
