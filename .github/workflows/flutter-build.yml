name: Flutter Build

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - '.github/workflows/flutter-build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'
      - '.github/workflows/flutter-build.yml'

jobs:
  build-android:
    name: Android APK / AAB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build runner (code gen)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test --no-pub

      - name: Setup release signing
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
            echo "$KEY_PROPERTIES" > android/key.properties
          fi

      - name: Build APK (debug — PR)
        if: github.event_name == 'pull_request'
        run: |
          flutter build apk --debug \
            --dart-define=FLAVOR=prod

      - name: Build APK + AAB (release — main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          flutter build apk --release \
            --dart-define=FLAVOR=prod \
            --dart-define=ADMOB_APP_ID_ANDROID=${{ secrets.ADMOB_APP_ID_ANDROID }}
          flutter build appbundle --release \
            --dart-define=FLAVOR=prod \
            --dart-define=ADMOB_APP_ID_ANDROID=${{ secrets.ADMOB_APP_ID_ANDROID }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: app/build/app/outputs/flutter-apk/*.apk
          retention-days: 14

      - name: Upload AAB
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.sha }}
          path: app/build/app/outputs/bundle/release/*.aab
          retention-days: 30
