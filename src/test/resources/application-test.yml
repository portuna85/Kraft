spring:
  datasource:
    url: jdbc:h2:mem:kraft_lotto_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

kraft:
  security:
    rate-limit:
      enabled: false
  history-init:
    enabled: false
  lotto:
    scheduler:
      enabled: false
  collect:
    auto:
      enabled: false
  skip:
    required-config-validator: true
  api:
    client: mock
    url: http://localhost
    connect-timeout-ms: 2000
    read-timeout-ms: 3000
    request-timeout-ms: 10000
    max-retries: 2
    retry-backoff-ms: 50
    backfill-delay-ms: 0
    mock-latest-round: 1200
    circuit-breaker-enabled: false
    circuit-breaker-failure-threshold: 5
    circuit-breaker-open-duration-ms: 30000
    circuit-breaker-half-open-max-calls: 1
  recommend:
    max-attempts: 1000

logging:
  level:
    org.hibernate.orm.deprecation: ERROR
    org.flywaydb.core.internal.database.base.Database: ERROR
    org.flywaydb.core.internal.sqlscript.DefaultSqlScriptExecutor: ERROR
    org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration: ERROR
    org.mariadb.jdbc.message.server.ErrorPacket: ERROR
    org.hibernate.orm.jdbc.error: ERROR
