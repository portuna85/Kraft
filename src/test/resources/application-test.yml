spring:
  datasource:
    url: jdbc:h2:mem:kraft-lotto;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul

logging:
  level:
    root: warn

kraft:
  ops:
    token: test-ops-token
