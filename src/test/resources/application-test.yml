spring:
  datasource:
    url: jdbc:h2:mem:kraft-lotto;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
  sql:
    init:
      mode: always
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
          naver:
            client-id: test-naver-client-id
            client-secret: test-naver-client-secret

logging:
  file:
    path: build/test-logs
  level:
    root: warn

kraft:
  ops:
    token: test-ops-token
