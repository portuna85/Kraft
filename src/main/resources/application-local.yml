spring:
  config:
    activate:
      on-profile: local
    import: optional:file:.env.local[.properties]
  datasource:
    # Direct bootRun works with embedded H2 by default.
    # Set KRAFT_DB_* to use MariaDB from Docker Compose or a local database.
    url: ${KRAFT_DB_URL:jdbc:h2:file:./build/local-db/kraft-lotto;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
    username: ${KRAFT_DB_USERNAME:sa}
    password: ${KRAFT_DB_PASSWORD:}
    hikari:
      connection-timeout: 5000
      initialization-fail-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: ${KRAFT_JPA_DDL_AUTO:update}
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
        format_sql: true
  sql:
    init:
      mode: never
  flyway:
    enabled: ${KRAFT_FLYWAY_ENABLED:false}

logging:
  level:
    root: info
    com.kraft: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.error: error
    org.hibernate.orm.jdbc: error
    com.zaxxer.hikari: warn
