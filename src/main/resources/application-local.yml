spring:
  datasource:
    url: ${KRAFT_DB_URL:jdbc:mariadb://${KRAFT_DB_HOST:localhost}:${KRAFT_DB_PORT:3306}/${KRAFT_DB_NAME:kraft_lotto}?rewriteBatchedStatements=true&useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul&connectTimeout=3000}
    username: ${KRAFT_DB_USER}
    password: ${KRAFT_DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
  thymeleaf:
    cache: false
  web:
    resources:
      cache:
        period: 0
        cachecontrol:
          no-store: true
  jpa:
    properties:
      hibernate:
        format_sql: true
  flyway:
    validate-on-migrate: false

management:
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

kraft:
  history-init:
    enabled: true
  collect:
    auto:
      enabled: false
  api:
    client: ${KRAFT_API_CLIENT:smok}
    url: ${KRAFT_API_URL:http://localhost}
    backfill-delay-ms: 300
    mock-latest-round: ${KRAFT_API_MOCK_LATEST_ROUND:0}
