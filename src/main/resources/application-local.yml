spring:
  config:
    activate:
      on-profile: local
    import: optional:file:.env.local[.properties]
  datasource:
    # 기본값: H2 인메모리 — Docker 없이 IntelliJ에서 바로 실행 가능.
    # MariaDB(Docker)를 사용하려면 .env.local 에서 아래 값을 덮어쓰세요:
    #   KRAFT_DB_URL=jdbc:mariadb://localhost:3306/kraft_lotto?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    #   KRAFT_DB_USERNAME=kraft_lotto
    #   KRAFT_DB_PASSWORD=<.env 의 MARIADB_PASSWORD 값>
    #   KRAFT_FLYWAY_ENABLED=true
    #   KRAFT_JPA_DDL_AUTO=validate
    url: ${KRAFT_DB_URL:jdbc:h2:mem:kraft-lotto;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    username: ${KRAFT_DB_USERNAME:sa}
    password: ${KRAFT_DB_PASSWORD:}
    hikari:
      connection-timeout: 5000
      initialization-fail-timeout: 5000
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: ${KRAFT_JPA_DDL_AUTO:create-drop}
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
        format_sql: true
  sql:
    init:
      mode: never
  flyway:
    enabled: ${KRAFT_FLYWAY_ENABLED:false}
    baseline-on-migrate: ${KRAFT_FLYWAY_BASELINE_ON_MIGRATE:false}
    baseline-version: ${KRAFT_FLYWAY_BASELINE_VERSION:1}

kraft:
  revalidate:
    # 로컬에서는 Docker 호스트명(web) 대신 localhost 사용
    web-url: ${KRAFT_REVALIDATE_WEB_URL:http://localhost:3000}

logging:
  level:
    root: info
    com.kraft: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.error: error
    org.hibernate.orm.jdbc: error
    com.zaxxer.hikari: warn
