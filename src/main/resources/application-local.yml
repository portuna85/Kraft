spring:
  config:
    activate:
      on-profile: local
    import: optional:file:.env.local[.properties]
  datasource:
    # All credentials must be supplied via .env.local or environment variables.
    # No sensitive defaults here — copy .env.local.example to .env.local and fill in values.
    # Inside Docker Compose the container receives KRAFT_DB_* via the environment: block.
    url: ${KRAFT_DB_URL:jdbc:mariadb://localhost:3306/kraft_lotto?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul}
    username: ${KRAFT_DB_USERNAME}
    password: ${KRAFT_DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      connection-timeout: 5000
      initialization-fail-timeout: 5000
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
        format_sql: true
  sql:
    init:
      mode: never

logging:
  level:
    root: info
    com.kraft: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.error: error
    org.hibernate.orm.jdbc: error
    com.zaxxer.hikari: warn
