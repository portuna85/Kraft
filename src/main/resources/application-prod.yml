spring:
  thymeleaf:
    cache: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: ${KRAFT_TRACING_SAMPLE_RATE:0.1}

kraft:
  history-init:
    enabled: ${KRAFT_HISTORY_INIT_ENABLED:false}
  api:
    client: ${KRAFT_API_CLIENT:real}
