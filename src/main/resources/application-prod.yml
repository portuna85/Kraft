server:
  servlet:
    session:
      cookie:
        # OAuth2 authorization callback은 외부 provider에서 돌아오는 top-level GET이므로
        # SameSite=Strict이면 기존 세션의 state를 복원하지 못한다. Lax는 이 왕복을 허용하면서
        # cross-site subrequest에는 쿠키를 보내지 않으며, 쓰기 요청은 CSRF 토큰으로 보호한다.
        secure: true
        same-site: lax
        http-only: true

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${KRAFT_DB_URL}
    username: ${KRAFT_DB_USERNAME}
    password: ${KRAFT_DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 15
      minimum-idle: 3
      idle-timeout: 600000
  jpa:
    # ddl-auto: validate, hibernate.jdbc.time_zone, sql.init.mode은 application.yml 기본 설정에서 상속
    properties:
      hibernate:
        jdbc:
          batch_size: 25
          fetch_size: 50
        format_sql: false
        order_inserts: true
        order_updates: true

logging:
  level:
    root: warn
    com.kraft: info
