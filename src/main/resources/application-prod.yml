server:
  servlet:
    session:
      cookie:
        # 관리자 콘솔(폼 로그인)만 세션 쿠키를 사용한다(/api/**는 STATELESS) — HTTPS로만
        # 전송되고 크로스사이트 요청에는 실리지 않도록 명시적으로 강화한다.
        secure: true
        same-site: strict
        http-only: true

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${KRAFT_DB_URL}
    username: ${KRAFT_DB_USERNAME}
    password: ${KRAFT_DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 15
      minimum-idle: 3
      idle-timeout: 600000
  jpa:
    # ddl-auto: validate is inherited from application.yml base config
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
          batch_size: 25
          fetch_size: 50
        format_sql: false
        order_inserts: true
        order_updates: true
  sql:
    init:
      mode: never

logging:
  level:
    root: warn
    com.kraft: info
