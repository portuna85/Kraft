spring:
  thymeleaf:
    cache: true
  datasource:
    hikari:
      maximum-pool-size: ${KRAFT_DB_POOL_MAX_SIZE:20}
      minimum-idle: ${KRAFT_DB_POOL_MIN_IDLE:5}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: ${KRAFT_TRACING_SAMPLE_RATE:0.1}

kraft:
  history-init:
    enabled: ${KRAFT_HISTORY_INIT_ENABLED:false}
  api:
    client: ${KRAFT_API_CLIENT:real}
  security:
    headers:
      hsts-enabled: ${KRAFT_SECURITY_HSTS_ENABLED:true}
