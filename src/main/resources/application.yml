spring:
  application:
    name: kraft-lotto
  threads:
    virtual:
      enabled: true
  main:
    keep-alive: true
  jackson:
    time-zone: Asia/Seoul
    locale: ko-KR
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${KRAFT_JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
  sql:
    init:
      mode: never
  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      max-lifetime: 1800000
      keepalive-time: 30000
  flyway:
    enabled: true
  profiles:
    default: local

# Google/Naver 등록을 조건부 문서로 분리한 이유(2026-07-24): 위 spring: 블록에 이 등록을
# 무조건 넣어두면, client-id 환경변수가 비어 있어도 스프링 부트의
# OAuth2ClientProperties.validate()가 "Client id of registration 'google' must not be
# empty"로 기동 자체를 막는다. config-data 문서가 지원하는 profile 조건을 사용하고,
# render-env.sh가 ID/secret이 모두 채워진 provider profile만 SPRING_PROFILES_INCLUDE에
# 넣는다. 자격 증명이 없으면 해당 profile을 포함하지 않아 registration 문서도 로드되지 않는다.
---
spring:
  config:
    activate:
      on-profile: community-google-oauth
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${KRAFT_COMMUNITY_GOOGLE_CLIENT_ID}
            client-secret: ${KRAFT_COMMUNITY_GOOGLE_CLIENT_SECRET}
            # openid 스코프를 넣지 않는다 — 포함 시 Spring Security가 OIDC 플로우(OidcUserService)로
            # 전환해 아래 CommunityOAuth2UserService(plain OAuth2UserService)가 호출되지 않는다.
            # Naver와 동일한 커스텀 서비스로 처리하기 위해 의도적으로 plain OAuth2를 유지한다.
            # 커뮤니티는 표시 이름만 사용하며 이메일은 수집·저장하지 않는다.
            scope: profile
---
spring:
  config:
    activate:
      on-profile: community-naver-oauth
  security:
    oauth2:
      client:
        registration:
          naver:
            client-id: ${KRAFT_COMMUNITY_NAVER_CLIENT_ID}
            client-secret: ${KRAFT_COMMUNITY_NAVER_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            redirect-uri: "{baseUrl}/{action}/oauth2/code/{registrationId}"
            # Naver 명세상 scope는 내부 구분값이라 전송할 필요가 없다. 제공 정보는 개발자
            # 콘솔에서 별명만 허용하며, 애플리케이션은 이메일·회원이름을 수집하지 않는다.
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

---
server:
  port: 8080
  forward-headers-strategy: framework

logging:
  file:
    path: ${KRAFT_LOG_PATH:logs}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      externalLotto:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        register-health-indicator: true
  retry:
    instances:
      externalLotto:
        max-attempts: 2
        wait-duration: 500ms
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException

kraft:
  public-base-url: ${KRAFT_PUBLIC_BASE_URL:}
  external-lotto:
    url-template: ${KRAFT_EXTERNAL_LOTTO_URL_TEMPLATE:}
    auto-collect-cron: ${KRAFT_EXTERNAL_LOTTO_AUTO_COLLECT_CRON:0 30/15 21-23 * * SAT}
    referer: ${KRAFT_EXTERNAL_LOTTO_REFERER:https://www.dhlottery.co.kr/lt645/result}
    requested-with: ${KRAFT_EXTERNAL_LOTTO_REQUESTED_WITH:XMLHttpRequest}

  ops:
    token: ${KRAFT_OPS_TOKEN:}
  saved:
    max-per-client: ${KRAFT_SAVED_MAX_PER_CLIENT:100}
  community:
    write-rate-limit-per-minute: ${KRAFT_COMMUNITY_WRITE_RATE_LIMIT_PER_MINUTE:20}
  security:
    trusted-proxy-cidr: ${KRAFT_SECURITY_TRUSTED_PROXY_CIDR:172.28.0.0/16}
    rate-limit-per-minute: ${KRAFT_SECURITY_RATE_LIMIT_PER_MINUTE:120}
    rate-limit-max-keys: ${KRAFT_SECURITY_RATE_LIMIT_MAX_KEYS:10000}
  revalidate:
    secret: ${KRAFT_REVALIDATE_SECRET:}
    web-url: ${KRAFT_REVALIDATE_WEB_URL:http://web:3000}
  retention:
    operation-log-days: ${KRAFT_RETENTION_OPERATION_LOG_DAYS:30}
    admin-audit-log-days: ${KRAFT_RETENTION_ADMIN_AUDIT_LOG_DAYS:90}
