<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('최고의 번호', ~{::section})}">
<section class="kraft-page">
  <header class="kraft-hero">
    <p class="eyebrow">로또 번호 추천</p>
    <h1>최고의 번호</h1>
    <p class="kraft-hero-description">과거 당첨 패턴을 분석해 데이터 기반으로 로또 번호를 추천합니다.</p>
  </header>

  <th:block th:replace="~{fragments/latest-card :: latest-card}"></th:block>
  <th:block th:replace="~{fragments/recommend-card :: recommend-card}"></th:block>
  <th:block th:replace="~{fragments/round-search-card :: round-search-card}"></th:block>
  <div id="fragment-live-region" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>

  <div id="frequency" class="card mb-4 kraft-section kraft-section-frequency"
       hx-get="/fragments/frequency" hx-trigger="load" hx-swap="outerHTML"
       aria-busy="true" aria-live="polite">
    <div class="card-body">
      <div class="kraft-state kraft-state-loading" data-state="loading">번호 출현 빈도를 불러오는 중입니다...</div>
      <div class="kraft-state kraft-state-error" data-state="error" hidden>
        데이터를 불러오지 못했습니다.
        <div class="mt-2">
          <button type="button" class="btn btn-sm btn-outline-secondary kraft-retry-btn" data-target="frequency">다시 시도</button>
        </div>
      </div>
    </div>
  </div>

  <div id="rounds" class="card kraft-section kraft-section-rounds" hx-get="/fragments/rounds" hx-trigger="load" hx-swap="outerHTML"
       aria-busy="true" aria-live="polite">
    <div class="card-body">
      <div class="kraft-state kraft-state-loading" data-state="loading">회차 목록을 불러오는 중입니다...</div>
      <div class="kraft-state kraft-state-error" data-state="error" hidden>
        데이터를 불러오지 못했습니다.
        <div class="mt-2">
          <button type="button" class="btn btn-sm btn-outline-secondary kraft-retry-btn" data-target="rounds">다시 시도</button>
        </div>
      </div>
    </div>
  </div>
</section>
</html>
