<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('kLo', ~{::section})}">
<section class="kraft-page">
  <header class="kraft-hero">
    <p class="eyebrow">Lotto Number Recommendation</p>
    <h1>kLo</h1>
    <p class="kraft-hero-description">Rule-based randomized lotto combinations built from historical draw data.</p>
  </header>

  <th:block th:replace="~{fragments/latest-card :: latest-card}"></th:block>
  <div id="recommend" class="card mb-4 kraft-section kraft-section-recommend"
       hx-get="/fragments/recommend" hx-trigger="load" hx-swap="outerHTML"
       aria-busy="true" aria-live="polite">
    <div class="card-body">
      <div class="kraft-state kraft-state-loading" data-state="loading">Loading recommended numbers...</div>
      <div class="kraft-state kraft-state-error" data-state="error" hidden>
        Failed to load data.
        <div class="mt-2">
          <button type="button" class="btn btn-sm btn-outline-secondary kraft-retry-btn" data-target="recommend">Retry</button>
        </div>
      </div>
    </div>
  </div>
  <th:block th:replace="~{fragments/round-search-card :: round-search-card}"></th:block>
  <div id="fragment-live-region" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>

  <div id="frequency" class="card mb-4 kraft-section kraft-section-frequency"
       hx-get="/fragments/frequency" hx-trigger="load" hx-swap="outerHTML"
       aria-busy="true" aria-live="polite">
    <div class="card-body">
      <div class="kraft-state kraft-state-loading" data-state="loading">Loading number frequency...</div>
      <div class="kraft-state kraft-state-error" data-state="error" hidden>
        Failed to load data.
        <div class="mt-2">
          <button type="button" class="btn btn-sm btn-outline-secondary kraft-retry-btn" data-target="frequency">Retry</button>
        </div>
      </div>
    </div>
  </div>

  <div id="rounds" class="card kraft-section kraft-section-rounds" hx-get="/fragments/rounds" hx-trigger="load" hx-swap="outerHTML"
       aria-busy="true" aria-live="polite">
    <div class="card-body">
      <div class="kraft-state kraft-state-loading" data-state="loading">Loading rounds...</div>
      <div class="kraft-state kraft-state-error" data-state="error" hidden>
        Failed to load data.
        <div class="mt-2">
          <button type="button" class="btn btn-sm btn-outline-secondary kraft-retry-btn" data-target="rounds">Retry</button>
        </div>
      </div>
    </div>
  </div>
</section>
</html>
