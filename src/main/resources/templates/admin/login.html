<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Admin Login - KRAFT Lotto</title>
  <link rel="stylesheet" th:href="@{/vendor/bootstrap/bootstrap.min.css}">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh">
<div class="card shadow" style="width:24rem">
  <div class="card-body p-4">
    <h4 class="card-title text-center mb-4">KRAFT 관리자 로그인</h4>

    <div th:if="${param.locked != null}" class="alert alert-danger" role="alert">
      로그인 시도 횟수를 초과했습니다. 잠시 후 다시 시도하세요.
    </div>
    <div th:if="${param.error != null and param.locked == null}" class="alert alert-danger" role="alert">
      비밀번호가 올바르지 않습니다.
    </div>
    <div th:if="${logoutMessage}" class="alert alert-success" role="alert" th:text="${logoutMessage}">
      로그아웃되었습니다.
    </div>

    <form th:action="@{/admin/login}" method="post">
      <input type="hidden" name="username" value="admin">
      <div class="mb-3">
        <label for="password" class="form-label">비밀번호</label>
        <input type="password" class="form-control" id="password" name="password"
               placeholder="관리자 비밀번호" autocomplete="current-password" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary w-100">로그인</button>
    </form>
  </div>
</div>
</body>
</html>
