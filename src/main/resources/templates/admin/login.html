<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>KRAFT 관리자 로그인</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 2.5rem 2rem; width: 100%; max-width: 380px; }
    h1 { color: #f1f5f9; font-size: 1.4rem; margin-bottom: 0.25rem; }
    p.sub { color: #94a3b8; font-size: 0.85rem; margin-bottom: 1.75rem; }
    label { display: block; color: #cbd5e1; font-size: 0.8rem; margin-bottom: 0.35rem; }
    input { width: 100%; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: #f1f5f9; font-size: 0.95rem; padding: 0.6rem 0.75rem; margin-bottom: 1rem; }
    input:focus { outline: 2px solid #6366f1; border-color: transparent; }
    button { width: 100%; background: #6366f1; color: #fff; border: none; border-radius: 6px; padding: 0.65rem; font-size: 0.95rem; cursor: pointer; margin-top: 0.25rem; }
    button:hover { background: #4f46e5; }
    .alert { border-radius: 6px; font-size: 0.85rem; padding: 0.6rem 0.75rem; margin-bottom: 1rem; }
    .alert-error { background: #450a0a; border: 1px solid #ef4444; color: #fca5a5; }
    .alert-warn { background: #431407; border: 1px solid #f97316; color: #fdba74; }
  </style>
</head>
<body>
<div class="card">
  <h1>KRAFT 관리자</h1>
  <p class="sub">내부 관리 콘솔</p>

  <div class="alert alert-error" th:if="${param.error}">아이디 또는 비밀번호가 올바르지 않습니다.</div>
  <div class="alert alert-warn" th:if="${param.locked}">로그인 시도 횟수 초과로 15분간 잠겼습니다.</div>
  <div class="alert alert-error" th:if="${param.logout}" style="background:#052e16;border-color:#22c55e;color:#86efac">로그아웃 되었습니다.</div>

  <form method="post" action="/admin/login" th:action="@{/admin/login}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <label for="username">사용자명</label>
    <input id="username" name="username" type="text" autocomplete="username" autofocus required/>
    <label for="password">비밀번호</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required/>
    <button type="submit">로그인</button>
  </form>
</div>
</body>
</html>
