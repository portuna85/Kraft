<div xmlns:th="http://www.thymeleaf.org" class="card mb-4" th:fragment="status-card">
  <div class="card-body">
    <h2 class="h5 mb-3">수집 및 환경 상태</h2>
    <div class="row g-3">

      <div class="col-md-4">
        <div class="border rounded p-2 h-100">
          <div class="text-muted small mb-1">회차 상태</div>
          <div class="d-flex align-items-baseline gap-2">
            <span class="fs-4 fw-bold" th:text="${latestStoredRound}">-</span>
            <span class="small text-muted">/ 예상 <strong th:text="${expectedRound}">-</strong></span>
          </div>
          <div th:if="${roundGap != null}">
            <span th:if="${roundGap == 0}" class="badge bg-success">최신</span>
            <span th:if="${roundGap > 0}" class="badge bg-warning text-dark"
                  th:text="${roundGap} + '회차 미수집'">미수집</span>
            <span th:if="${roundGap < 0}" class="badge bg-secondary">초과</span>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="border rounded p-2 h-100">
          <div class="text-muted small mb-1">활성 프로필</div>
          <div>
            <span th:each="profile : ${activeProfiles}"
                  class="badge bg-info text-dark me-1" th:text="${profile}">-</span>
          </div>
        </div>
      </div>

      <div class="col-md-4" th:if="${buildVersion != null}">
        <div class="border rounded p-2 h-100">
          <div class="text-muted small mb-1">빌드 정보</div>
          <div class="small">
            <div th:text="'v' + ${buildVersion}">-</div>
            <div class="text-muted"
                 th:if="${buildTime != null}"
                 th:text="${#temporals.format(buildTime, 'yyyy-MM-dd HH:mm')} + ' UTC'">-</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
