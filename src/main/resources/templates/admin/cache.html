<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('캐시 관리', '애플리케이션 캐시 관리', ~{::section})}">
<section class="kraft-page">
  <header class="kraft-hero">
    <p class="eyebrow">Admin</p>
    <h1>캐시 관리</h1>
  </header>

  <div class="container py-3">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="d-flex justify-content-end mb-3">
      <form th:action="@{/admin/ops/cache/evict-all}" method="post"
            onsubmit="return confirm('모든 캐시를 초기화합니다.\n진행 중인 요청에 영향을 줄 수 있습니다. 계속하시겠습니까?')">
        <button type="submit" class="btn btn-danger btn-sm">전체 초기화</button>
      </form>
    </div>

    <div class="table-responsive">
      <table class="table table-sm align-middle">
        <thead class="table-secondary">
          <tr>
            <th>캐시 이름</th>
            <th class="text-end">항목 수</th>
            <th class="text-end">히트</th>
            <th class="text-end">미스</th>
            <th class="text-end">히트율</th>
            <th class="text-end">만료</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="stat : ${cacheStats}">
            <td><code th:text="${stat.name}"></code></td>
            <td class="text-end" th:text="${stat.size >= 0 ? stat.size : '-'}"></td>
            <td class="text-end" th:text="${stat.hits >= 0 ? stat.hits : '-'}"></td>
            <td class="text-end" th:text="${stat.misses >= 0 ? stat.misses : '-'}"></td>
            <td class="text-end">
              <span th:if="${stat.hits >= 0}"
                    th:classappend="${stat.hitRatePct >= 80 ? 'text-success' : (stat.hitRatePct >= 50 ? 'text-warning' : 'text-danger')}"
                    th:text="${stat.hitRatePct} + '%'"></span>
              <span th:if="${stat.hits < 0}" class="text-muted">-</span>
            </td>
            <td class="text-end" th:text="${stat.evictions >= 0 ? stat.evictions : '-'}"></td>
            <td class="text-end">
              <form th:action="@{/admin/ops/cache/{name}/evict(name=${stat.name})}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-warning btn-sm"
                        th:attr="data-name=${stat.name}"
                        onclick="return confirm(this.dataset.name + ' 캐시를 초기화합니다. 계속하시겠습니까?')">초기화</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="mt-3">
      <a th:href="@{/admin/ops}" class="btn btn-secondary btn-sm">대시보드로</a>
    </div>
  </div>
</section>
</html>
