<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('SEO 점검', 'SEO 설정 현황 점검', ~{::section})}">
<section class="kraft-page">
  <header class="kraft-hero">
    <p class="eyebrow">Admin</p>
    <h1>SEO 점검</h1>
  </header>

  <div class="container py-3">
    <div class="row g-3">

      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-header">기본 설정</div>
          <div class="card-body">
            <dl class="row mb-0 small">
              <dt class="col-4 text-muted">Base URL</dt>
              <dd class="col-8">
                <a th:href="${baseUrl}" target="_blank" rel="noopener" th:text="${baseUrl}"></a>
              </dd>
              <dt class="col-4 text-muted">sitemap.xml</dt>
              <dd class="col-8">
                <a th:href="${sitemapUrl}" target="_blank" rel="noopener" th:text="${sitemapUrl}"></a>
              </dd>
              <dt class="col-4 text-muted">robots.txt</dt>
              <dd class="col-8">
                <a th:href="${robotsTxtUrl}" target="_blank" rel="noopener" th:text="${robotsTxtUrl}"></a>
              </dd>
            </dl>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-header">robots.txt — Disallow</div>
          <div class="card-body">
            <ul class="list-unstyled mb-0 small font-monospace">
              <li th:each="path : ${robotsDisallowed}">
                <span class="text-danger">Disallow:</span> <span th:text="${path}"></span>
              </li>
            </ul>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-header">noindex 적용 경로</div>
          <div class="card-body">
            <ul class="list-unstyled mb-0 small font-monospace">
              <li th:each="path : ${noindexPaths}">
                <span class="badge bg-secondary me-1">noindex</span>
                <span th:text="${path}"></span>
              </li>
            </ul>
            <div class="text-muted small mt-2">관리자 로그인 페이지에도 noindex 적용됨</div>
          </div>
        </div>
      </div>

      <div class="col-12">
        <div class="card">
          <div class="card-header">sitemap.xml 항목 (<span th:text="${sitemapEntries.size()}">0</span>건)</div>
          <div class="table-responsive">
            <table class="table table-sm mb-0">
              <thead class="table-secondary">
                <tr><th>URL</th><th>changefreq</th><th>priority</th></tr>
              </thead>
              <tbody>
                <tr th:each="entry : ${sitemapEntries}">
                  <td><small><a th:href="${entry.url}" target="_blank" rel="noopener" th:text="${entry.url}"></a></small></td>
                  <td><small th:text="${entry.changefreq}"></small></td>
                  <td><small th:text="${entry.priority}"></small></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>

    <div class="mt-3">
      <a th:href="@{/admin/ops}" class="btn btn-secondary btn-sm">대시보드로</a>
    </div>
  </div>
</section>
</html>
