<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('뉴스 관리', '뉴스 기사 승인 관리', ~{::section})}">
<section class="kraft-page">
  <header class="kraft-hero">
    <p class="eyebrow">Admin</p>
    <h1>뉴스 관리</h1>
  </header>

  <div class="container py-3">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <div class="card mb-3">
      <div class="card-header">기존 승인 기사 재분류</div>
      <div class="card-body">
        <p class="text-muted small mb-2">차단 키워드/관련성 정책 기준으로 이미 승인된 기사를 재검사하여 노이즈 기사를 거부 처리합니다.</p>
        <div class="row g-2 align-items-center">
          <div class="col-auto">
            <label for="reclassifyDays" class="col-form-label col-form-label-sm">최근</label>
          </div>
          <div class="col-auto">
            <select id="reclassifyDays" class="form-select form-select-sm w-auto">
              <option value="30" selected>30일</option>
              <option value="60">60일</option>
              <option value="90">90일</option>
              <option value="365">전체(365일)</option>
            </select>
          </div>
          <div class="col-auto">
            <button type="button" class="btn btn-outline-secondary btn-sm" id="reclassifyDryRunBtn">미리보기</button>
          </div>
          <div class="col-auto">
            <button type="button" class="btn btn-warning btn-sm" id="reclassifyApplyBtn">재분류 적용</button>
          </div>
          <div class="col-12 mt-2" id="reclassifyResult" role="status" aria-live="polite"></div>
        </div>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-header">키워드 차단 추가</div>
      <div class="card-body">
        <form th:action="@{/admin/ops/news/block-keyword}" method="post" class="row g-2"
              data-confirm="이 키워드를 차단합니다. 이후 해당 키워드를 포함한 기사는 수집되지 않습니다. 계속하시겠습니까?">
          <div class="col-5">
            <input type="text" name="keyword" class="form-control form-control-sm" placeholder="차단할 키워드" required>
          </div>
          <div class="col-5">
            <input type="text" name="reason" class="form-control form-control-sm" placeholder="사유(선택)">
          </div>
          <div class="col-2">
            <button type="submit" class="btn btn-warning btn-sm w-100">차단</button>
          </div>
        </form>
      </div>
    </div>

    <ul class="nav nav-tabs mb-3">
      <li class="nav-item">
        <a class="nav-link" th:classappend="${tab == 'pending' or tab == null} ? 'active'"
           th:href="@{/admin/ops/news(tab='pending')}">대기</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" th:classappend="${tab == 'approved'} ? 'active'"
           th:href="@{/admin/ops/news(tab='approved')}">승인</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" th:classappend="${tab == 'rejected'} ? 'active'"
           th:href="@{/admin/ops/news(tab='rejected')}">거부</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" th:classappend="${tab == 'blocked'} ? 'active'"
           th:href="@{/admin/ops/news(tab='blocked')}">차단 규칙</a>
      </li>
    </ul>

    <!-- 대기 / 승인 / 거부 탭 -->
    <div th:if="${tab != 'blocked'}">
      <p class="text-muted small mb-2">
        총 <span th:text="${articles != null ? articles.totalElements : 0}">0</span>건
      </p>
      <div class="table-responsive">
        <table class="table table-sm">
          <thead class="table-secondary">
            <tr>
              <th>제목</th>
              <th>출처</th>
              <th>도메인</th>
              <th>수집일시</th>
              <th th:if="${tab == 'pending' or tab == null}">작업</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="article : ${articles}">
              <td>
                <a th:href="${article.link}" target="_blank" rel="noopener"
                   th:text="${#strings.abbreviate(article.title, 60)}"></a>
              </td>
              <td th:text="${article.source}"></td>
              <td><small th:text="${article.sourceDomain}"></small></td>
              <td><small th:text="${#temporals.format(article.collectedAt, 'MM-dd HH:mm')}"></small></td>
              <td th:if="${tab == 'pending' or tab == null}">
                <div class="btn-group btn-group-sm">
                  <form th:action="@{/admin/ops/news/{id}/approve(id=${article.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-success btn-sm">승인</button>
                  </form>
                  <form th:action="@{/admin/ops/news/{id}/reject(id=${article.id})}" method="post" class="d-inline ms-1">
                    <button type="submit" class="btn btn-secondary btn-sm">거부</button>
                  </form>
                  <form th:action="@{/admin/ops/news/{id}/block-domain(id=${article.id})}" method="post" class="d-inline ms-1">
                    <button type="submit" class="btn btn-danger btn-sm"
                            th:data-confirm="|${article.sourceDomain} 도메인을 차단합니다. 해당 도메인의 모든 기사가 거부됩니다. 계속하시겠습니까?|">도메인 차단</button>
                  </form>
                </div>
              </td>
            </tr>
            <tr th:if="${articles == null or articles.isEmpty()}">
              <td th:colspan="${tab == 'pending' or tab == null} ? 5 : 4"
                  class="text-center text-muted">기사가 없습니다.</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- 페이지네이션 -->
      <nav th:if="${articles != null and articles.totalPages > 1}">
        <ul class="pagination pagination-sm">
          <li class="page-item" th:classappend="${page == 0} ? 'disabled'">
            <a class="page-link"
               th:href="@{/admin/ops/news(tab=${tab},page=${page - 1},pageSize=${pageSize})}">이전</a>
          </li>
          <li class="page-item disabled">
            <span class="page-link"
                  th:text="${page + 1} + ' / ' + ${articles.totalPages}"></span>
          </li>
          <li class="page-item" th:classappend="${page + 1 >= articles.totalPages} ? 'disabled'">
            <a class="page-link"
               th:href="@{/admin/ops/news(tab=${tab},page=${page + 1},pageSize=${pageSize})}">다음</a>
          </li>
        </ul>
      </nav>
    </div>

    <!-- 차단 규칙 탭 -->
    <div th:if="${tab == 'blocked'}">
      <h6>차단 도메인 (<span th:text="${blockedDomains != null ? blockedDomains.size() : 0}">0</span>건)</h6>
      <div class="table-responsive mb-4">
        <table class="table table-sm">
          <thead class="table-secondary">
            <tr><th>도메인</th><th>사유</th><th>등록자</th><th>등록일시</th></tr>
          </thead>
          <tbody>
            <tr th:each="d : ${blockedDomains}">
              <td th:text="${d.domain}"></td>
              <td><small th:text="${d.reason}"></small></td>
              <td><small th:text="${d.createdBy}"></small></td>
              <td><small th:text="${#temporals.format(d.createdAt, 'MM-dd HH:mm')}"></small></td>
            </tr>
            <tr th:if="${blockedDomains == null or blockedDomains.isEmpty()}">
              <td colspan="4" class="text-center text-muted">차단된 도메인이 없습니다.</td>
            </tr>
          </tbody>
        </table>
      </div>

      <h6>차단 키워드 (<span th:text="${blockedKeywords != null ? blockedKeywords.size() : 0}">0</span>건)</h6>
      <div class="table-responsive">
        <table class="table table-sm">
          <thead class="table-secondary">
            <tr><th>키워드</th><th>사유</th><th>등록자</th><th>등록일시</th></tr>
          </thead>
          <tbody>
            <tr th:each="k : ${blockedKeywords}">
              <td th:text="${k.keyword}"></td>
              <td><small th:text="${k.reason}"></small></td>
              <td><small th:text="${k.createdBy}"></small></td>
              <td><small th:text="${#temporals.format(k.createdAt, 'MM-dd HH:mm')}"></small></td>
            </tr>
            <tr th:if="${blockedKeywords == null or blockedKeywords.isEmpty()}">
              <td colspan="4" class="text-center text-muted">차단된 키워드가 없습니다.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="mt-3">
      <a th:href="@{/admin/ops}" class="btn btn-secondary btn-sm">대시보드로</a>
    </div>
  </div>
</section>
<script th:inline="javascript" th:attr="nonce=${cspNonce}">
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('reclassifyDryRunBtn').addEventListener('click', reclassifyDryRun);
    document.getElementById('reclassifyApplyBtn').addEventListener('click', reclassifyApply);
  });
  function getDays() {
    return document.getElementById('reclassifyDays').value;
  }
  function setResult(msg, type) {
    const el = document.getElementById('reclassifyResult');
    el.className = 'col-12 mt-2 alert alert-' + (type || 'secondary') + ' py-1 px-2 small mb-0';
    el.textContent = msg;
  }
  function withLoading(btn, task) {
    btn.disabled = true;
    const orig = btn.innerHTML;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>처리 중...';
    task().finally(() => { btn.disabled = false; btn.innerHTML = orig; });
  }
  function reclassifyDryRun() {
    const days = getDays();
    setResult('조회 중...', 'secondary');
    withLoading(document.getElementById('reclassifyDryRunBtn'), () =>
      fetch('/admin/ops/news/reclassify?days=' + days)
        .then(r => r.json())
        .then(data => setResult('재분류 대상: ' + data.count + '건 (최근 ' + data.days + '일)', 'info'))
        .catch(() => setResult('조회 실패 — 로그를 확인하세요', 'danger'))
    );
  }
  function reclassifyApply() {
    const days = getDays();
    if (!confirm('최근 ' + days + '일 승인 기사를 재분류합니다. 노이즈 기사가 거부 처리됩니다. 계속하시겠습니까?')) return;
    setResult('적용 중...', 'secondary');
    withLoading(document.getElementById('reclassifyApplyBtn'), () =>
      fetch('/admin/ops/news/reclassify?days=' + days, { method: 'POST' })
        .then(r => r.json())
        .then(data => { setResult('완료: ' + data.reclassified + '건 거부 처리됨', 'success'); location.reload(); })
        .catch(() => setResult('적용 실패 — 로그를 확인하세요', 'danger'))
    );
  }
</script>
</html>
