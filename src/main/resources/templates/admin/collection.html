<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('수집 관리', '로또 데이터 수집 관리', ~{::section})}">
<section class="kraft-page">
  <header class="kraft-hero">
    <p class="eyebrow">Admin</p>
    <h1>수집 관리</h1>
  </header>

  <div class="container py-3">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger d-flex align-items-center justify-content-between">
      <span th:text="${error}"></span>
      <a th:href="@{/admin/ops}" class="alert-link ms-3 text-nowrap">수집 로그 확인 →</a>
    </div>

    <div class="row g-3">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">최신 회차 수집</div>
          <div class="card-body">
            <p class="card-text">API에서 최신 회차까지 누락된 데이터를 수집합니다.</p>
            <form th:action="@{/admin/ops/collection/latest}" method="post">
              <button type="submit" class="btn btn-primary"
                      data-confirm="최신 회차 수집을 실행하시겠습니까? 외부 API를 호출합니다.">수집 실행</button>
            </form>
          </div>
        </div>
      </div>

    </div>

    <div class="card mt-4">
      <div class="card-header">최근 실행 이력</div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-sm mb-0">
            <thead class="table-secondary">
              <tr>
                <th>작업</th>
                <th>대상</th>
                <th>실행자</th>
                <th>결과</th>
                <th>일시</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="log : ${recentHistory}">
                <td th:text="${log.action}"></td>
                <td><small th:text="${log.target}"></small></td>
                <td><small th:text="${log.actor}"></small></td>
                <td>
                  <span th:if="${log.result == 'SUCCESS'}" class="badge bg-success">성공</span>
                  <span th:if="${log.result != 'SUCCESS'}" class="badge bg-danger">실패</span>
                </td>
                <td><small th:text="${#temporals.format(log.createdAt, 'MM-dd HH:mm:ss')}"></small></td>
              </tr>
              <tr th:if="${recentHistory.isEmpty()}">
                <td colspan="5" class="text-center text-muted py-2">실행 이력이 없습니다.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="mt-3">
      <a th:href="@{/admin/ops}" class="btn btn-secondary btn-sm">대시보드로</a>
    </div>
  </div>
</section>
</html>
