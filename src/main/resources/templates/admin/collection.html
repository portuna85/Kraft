<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('수집 관리', '로또 데이터 수집 관리', ~{::section})}">
<section class="kraft-page">
  <header class="kraft-hero">
    <p class="eyebrow">Admin</p>
    <h1>수집 관리</h1>
  </header>

  <div class="container py-3">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row g-3">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">최신 회차 수집</div>
          <div class="card-body">
            <p class="card-text">API에서 최신 회차까지 누락된 데이터를 수집합니다.</p>
            <form th:action="@{/admin/ops/collection/latest}" method="post">
              <button type="submit" class="btn btn-primary"
                      onclick="return confirm('최신 회차 수집을 실행하시겠습니까?\n외부 API를 호출합니다.')">수집 실행</button>
            </form>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card">
          <div class="card-header">판매점 수집</div>
          <div class="card-body">
            <p class="card-text">특정 회차의 판매점 정보를 수집합니다.</p>
            <form th:action="@{/admin/ops/collection/stores}" method="post" class="row g-2"
                  onsubmit="return confirm('판매점 수집을 실행하시겠습니까?\n외부 API를 호출합니다.')">
              <div class="col-8">
                <input type="number" name="round" class="form-control" placeholder="회차 번호" required min="1">
              </div>
              <div class="col-4">
                <button type="submit" class="btn btn-primary w-100">수집</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="card mt-3">
      <div class="card-header">판매점 수동 입력</div>
      <div class="card-body">
        <p class="card-text text-muted small">자동 수집이 실패한 경우 직접 판매점 데이터를 입력합니다.<br>
          형식: <code>판매점명|주소|당첨건수</code> (주소, 당첨건수 생략 가능, 한 줄에 하나씩)</p>
        <form th:action="@{/admin/ops/collection/stores/manual}" method="post"
              onsubmit="return confirm('수동으로 판매점 데이터를 저장하시겠습니까?\n기존 데이터가 덮어쓰여집니다.')">
          <div class="row g-2 mb-2">
            <div class="col-4">
              <input type="number" name="round" class="form-control form-control-sm" placeholder="회차" required min="1">
            </div>
            <div class="col-4">
              <select name="grade" class="form-select form-select-sm" required>
                <option value="">등급 선택</option>
                <option value="1">1등</option>
                <option value="2">2등</option>
              </select>
            </div>
          </div>
          <textarea name="storesText" class="form-control form-control-sm mb-2" rows="6"
                    placeholder="판매점명|주소|당첨건수&#10;예) 행운복권방|서울 강남구 테헤란로 1|1&#10;예) 미래복권|부산 해운대구 센텀로 2" required></textarea>
          <button type="submit" class="btn btn-warning btn-sm">수동 저장</button>
        </form>
      </div>
    </div>

    <div class="card mt-4">
      <div class="card-header">최근 실행 이력</div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-sm mb-0">
            <thead class="table-secondary">
              <tr>
                <th>작업</th>
                <th>대상</th>
                <th>실행자</th>
                <th>결과</th>
                <th>일시</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="log : ${recentHistory}">
                <td th:text="${log.action}"></td>
                <td><small th:text="${log.target}"></small></td>
                <td><small th:text="${log.actor}"></small></td>
                <td>
                  <span th:if="${log.result == 'SUCCESS'}" class="badge bg-success">성공</span>
                  <span th:if="${log.result != 'SUCCESS'}" class="badge bg-danger">실패</span>
                </td>
                <td><small th:text="${#temporals.format(log.createdAt, 'MM-dd HH:mm:ss')}"></small></td>
              </tr>
              <tr th:if="${recentHistory.isEmpty()}">
                <td colspan="5" class="text-center text-muted py-2">실행 이력이 없습니다.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="mt-3">
      <a th:href="@{/admin/ops}" class="btn btn-secondary btn-sm">대시보드로</a>
    </div>
  </div>
</section>
</html>
