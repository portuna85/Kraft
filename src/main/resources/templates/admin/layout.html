<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${title} + ' — KRAFT 관리자'">KRAFT 관리자</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; min-height: 100vh; }
    nav { width: 200px; flex-shrink: 0; background: #1e293b; border-right: 1px solid #334155; padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 0.25rem; }
    nav h2 { color: #6366f1; font-size: 1rem; margin-bottom: 1rem; }
    nav a { color: #94a3b8; text-decoration: none; padding: 0.45rem 0.65rem; border-radius: 6px; font-size: 0.875rem; }
    nav a:hover, nav a.active { background: #334155; color: #f1f5f9; }
    nav .logout { margin-top: auto; color: #f87171; font-size: 0.8rem; }
    main { flex: 1; padding: 2rem; overflow-y: auto; }
    h1 { font-size: 1.4rem; margin-bottom: 1.25rem; color: #f1f5f9; }
    .alert { border-radius: 6px; font-size: 0.85rem; padding: 0.6rem 0.75rem; margin-bottom: 1rem; }
    .alert-success { background: #052e16; border: 1px solid #22c55e; color: #86efac; }
    .alert-error { background: #450a0a; border: 1px solid #ef4444; color: #fca5a5; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { background: #1e293b; color: #94a3b8; text-align: left; padding: 0.6rem 0.75rem; border-bottom: 1px solid #334155; }
    td { padding: 0.55rem 0.75rem; border-bottom: 1px solid #1e293b; }
    tr:hover td { background: #1e293b; }
    .btn { display: inline-block; padding: 0.4rem 0.9rem; border-radius: 5px; font-size: 0.8rem; text-decoration: none; border: none; cursor: pointer; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.75rem; }
    .pagination { display: flex; gap: 0.5rem; margin-top: 1rem; align-items: center; font-size: 0.85rem; color: #94a3b8; }
    .pagination a { color: #6366f1; text-decoration: none; }
  </style>
</head>
<body>
<nav>
  <h2>KRAFT 관리자</h2>
  <a th:href="@{/admin/dashboard}">대시보드</a>
  <a th:href="@{/admin/rounds}">회차 관리</a>
  <a th:href="@{/admin/audit}">감사 로그</a>
  <form th:action="@{/admin/logout}" method="post" class="logout" style="margin-top:auto">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" style="background:none;border:none;color:inherit;cursor:pointer;font-size:inherit;padding:0.45rem 0"
            sec:authentication="name">로그아웃</button>
  </form>
</nav>
<main>
  <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
  <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>
  <th:block th:replace="${content}"/>
</main>
</body>
</html>
