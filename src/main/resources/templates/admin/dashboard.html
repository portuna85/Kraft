<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{admin/layout :: layout('대시보드', ~{::content})}">
<th:block th:fragment="content">
  <h1>대시보드</h1>

  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-bottom:1.5rem">
    <div style="background:#1e293b;border:1px solid #334155;border-radius:8px;padding:1.25rem">
      <p style="color:#94a3b8;font-size:0.8rem;margin-bottom:0.4rem">최신 회차</p>
      <p style="font-size:1.5rem;font-weight:700;color:#f1f5f9" th:text="${latest.round} + '회'">-</p>
      <p style="color:#64748b;font-size:0.8rem" th:text="${latest.drawDate}">-</p>
    </div>
    <div style="background:#1e293b;border:1px solid #334155;border-radius:8px;padding:1.25rem">
      <p style="color:#94a3b8;font-size:0.8rem;margin-bottom:0.4rem">당첨 번호</p>
      <p style="font-size:1rem;color:#f1f5f9"
         th:text="${latest.num1}+', '+${latest.num2}+', '+${latest.num3}+', '+${latest.num4}+', '+${latest.num5}+', '+${latest.num6}+' + '+${latest.bonusNum}">-</p>
    </div>
  </div>

  <h2 style="font-size:1rem;color:#94a3b8;margin-bottom:0.75rem">수동 수집</h2>
  <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-end">
    <form th:action="@{/admin/rounds/collect}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn btn-primary">최신 회차 수집</button>
    </form>
    <form th:action="@{/admin/rounds/collect}" method="post" style="display:flex;gap:0.5rem">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="number" name="round" min="1" placeholder="회차 번호"
             style="background:#0f172a;border:1px solid #475569;border-radius:5px;color:#f1f5f9;padding:0.4rem 0.6rem;width:120px"/>
      <button type="submit" class="btn btn-primary">특정 회차 수집</button>
    </form>
  </div>
</th:block>
</html>
