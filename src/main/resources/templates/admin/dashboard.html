<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{admin/layout :: layout('대시보드', ~{::content})}">
<th:block th:fragment="content">
  <h1>대시보드</h1>

  <div th:if="${latest != null}"
       style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-bottom:1.5rem">
    <div style="background:#1e293b;border:1px solid #334155;border-radius:8px;padding:1.25rem">
      <p style="color:#94a3b8;font-size:0.8rem;margin-bottom:0.4rem">최신 회차</p>
      <p style="font-size:1.5rem;font-weight:700;color:#f1f5f9" th:text="${latest.round} + '회'">-</p>
      <p style="color:#64748b;font-size:0.8rem" th:text="${latest.drawDate}">-</p>
    </div>
    <div style="background:#1e293b;border:1px solid #334155;border-radius:8px;padding:1.25rem">
      <p style="color:#94a3b8;font-size:0.8rem;margin-bottom:0.4rem">당첨 번호</p>
      <p style="font-size:1rem;color:#f1f5f9"
         th:text="${latest.num1}+', '+${latest.num2}+', '+${latest.num3}+', '+${latest.num4}+', '+${latest.num5}+', '+${latest.num6}+' + '+${latest.bonusNumber}">-</p>
    </div>
  </div>
  <div th:if="${latest == null}"
       style="background:#1e293b;border:1px solid #334155;border-radius:8px;padding:1.5rem;margin-bottom:1.5rem;color:#94a3b8">
    <p>아직 수집된 당첨 번호 데이터가 없습니다. 아래 수동 수집으로 데이터를 가져오세요.</p>
  </div>

  <h2 style="font-size:1rem;color:#94a3b8;margin-bottom:0.25rem">수동 수집</h2>
  <p style="font-size:0.8rem;color:#64748b;margin-bottom:0.75rem">API에서 최신 회차까지 누락된 데이터를 수집합니다.</p>
  <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-end">
    <form th:action="@{/admin/rounds/collect}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn btn-primary">최신 회차 수집</button>
    </form>
    <form th:action="@{/admin/rounds/collect}" method="post" style="display:flex;gap:0.5rem">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="number" name="round" min="1" placeholder="회차 번호"
             style="background:#0f172a;border:1px solid #475569;border-radius:5px;color:#f1f5f9;padding:0.4rem 0.6rem;width:120px"/>
      <button type="submit" class="btn btn-primary">특정 회차 수집</button>
    </form>
  </div>

  <h2 style="font-size:1rem;color:#94a3b8;margin:1.5rem 0 0.25rem">전체 회차 수집 (백필)</h2>
  <p style="font-size:0.8rem;color:#64748b;margin-bottom:0.75rem">
    최신 회차 번호를 몰라도, 마지막 저장 회차 다음부터 더 이상 데이터가 없을 때까지 자동으로 전체 수집합니다.
    수 분이 소요되며 백그라운드에서 실행됩니다.</p>
  <form th:action="@{/admin/rounds/collect-all}" method="post"
        onsubmit="return confirm('1회차(또는 마지막 저장 회차 다음)부터 최신 회차까지 전체 수집을 시작합니다. 수 분이 소요될 수 있습니다. 계속하시겠습니까?');">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" class="btn btn-primary">전체 회차 수집 시작</button>
  </form>
</th:block>
</html>
