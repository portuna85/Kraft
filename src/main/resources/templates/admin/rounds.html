<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('회차 관리', ~{::content})}">
<th:block th:fragment="content">
  <h1>회차 관리</h1>

  <div style="display:flex;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap;align-items:flex-end">
    <form th:action="@{/admin/rounds/collect}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn btn-primary">최신 회차 수집</button>
    </form>
    <form th:action="@{/admin/rounds/collect}" method="post" style="display:flex;gap:0.5rem">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="number" name="round" min="1" placeholder="회차 번호"
             style="background:#0f172a;border:1px solid #475569;border-radius:5px;color:#f1f5f9;padding:0.4rem 0.6rem;width:120px"/>
      <button type="submit" class="btn btn-primary btn-sm">수집</button>
    </form>
  </div>

  <table>
    <thead>
    <tr>
      <th>회차</th><th>추첨일</th><th>1·2·3·4·5·6 + 보너스</th><th>1등 당첨금</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="r : ${rounds.items}">
      <td th:text="${r.round}"></td>
      <td th:text="${r.drawDate}"></td>
      <td th:text="${r.num1}+', '+${r.num2}+', '+${r.num3}+', '+${r.num4}+', '+${r.num5}+', '+${r.num6}+' + '+${r.bonusNumber}"></td>
      <td th:text="${#numbers.formatDecimal(r.firstPrizeAmount,0,'COMMA',0,'POINT')} + '원'"></td>
    </tr>
    <tr th:if="${rounds.items.isEmpty()}">
      <td colspan="4" style="text-align:center;color:#64748b;padding:1.25rem">조회된 회차 데이터가 없습니다.</td>
    </tr>
    </tbody>
  </table>

  <div class="pagination">
    <span th:text="'전체 ' + ${rounds.totalElements} + '건 (페이지 ' + (${rounds.page} + 1) + ' / ' + ${rounds.totalPages} + ')'"></span>
    <a th:if="${rounds.page > 0}" th:href="@{/admin/rounds(page=${rounds.page - 1})}">이전</a>
    <a th:if="${rounds.page + 1 < rounds.totalPages}" th:href="@{/admin/rounds(page=${rounds.page + 1})}">다음</a>
  </div>
</th:block>
</html>
