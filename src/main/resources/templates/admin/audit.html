<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('감사 로그', ~{::content})}">
<th:block th:fragment="content">
  <h1>감사 로그</h1>

  <table>
    <thead>
    <tr>
      <th>시각</th><th>관리자</th><th>액션</th><th>대상</th><th>IP</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="log : ${logs.content}">
      <td th:text="${#temporals.format(log.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
      <td th:text="${log.adminUser}"></td>
      <td th:text="${log.action}"></td>
      <td th:text="${log.target}"></td>
      <td th:text="${log.ipAddress}"></td>
    </tr>
    </tbody>
  </table>

  <div class="pagination">
    <span th:text="'총 ' + ${logs.totalElements} + '건'"></span>
    <a th:if="${logs.number > 0}" th:href="@{/admin/audit(page=${logs.number - 1})}">이전</a>
    <span th:text="${logs.number + 1} + ' / ' + ${logs.totalPages} + ' 페이지'"></span>
    <a th:if="${logs.number + 1 < logs.totalPages}" th:href="@{/admin/audit(page=${logs.number + 1})}">다음</a>
  </div>
</th:block>
</html>
