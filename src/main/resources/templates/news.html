<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('로또 뉴스', '로또 관련 최신 뉴스를 자동 수집하여 제공합니다.', ~{::section})}">
<section class="kraft-page">
  <header class="kraft-hero">
    <p class="eyebrow">로또 뉴스</p>
    <h1>최신 뉴스</h1>
    <p class="kraft-hero-description">로또 관련 최신 뉴스를 자동 수집하여 제공합니다.</p>
  </header>

  <div class="card mb-4 kraft-section" id="news-list">
    <div class="card-body p-0">
      <div th:if="${#lists.isEmpty(articles)}" class="kraft-state kraft-state-empty m-3">
        수집된 뉴스가 없습니다. 잠시 후 다시 확인해 주세요.
      </div>
      <ul class="news-list list-unstyled mb-0" th:unless="${#lists.isEmpty(articles)}">
        <li th:each="article, stat : ${articles}" class="news-item"
            th:classappend="${!stat.last} ? ' news-item--border'">
          <a class="news-link" th:href="${article.link()}" target="_blank" rel="noopener noreferrer">
            <div class="news-meta">
              <span class="news-source" th:text="${article.source()}" th:if="${article.source() != null}">출처</span>
              <span class="news-domain"
                    th:if="${article.sourceDomain() != null and !article.sourceDomain().equals(article.source())}"
                    th:text="${article.sourceDomain()}">domain</span>
              <span class="news-tier-badge"
                    th:if="${article.tier() != null}"
                    th:classappend="${article.tier().cssClass()}"
                    th:text="${article.tier().label()}"
                    th:title="${article.tier().label() == '공식'} ? '동행복권 등 공공기관 출처' : (${article.tier().label() == '언론'} ? '등록 언론사 출처' : '블로그·커뮤니티 등 일반 출처')">등급</span>
              <span class="news-date" th:text="${article.pubDateFormatted()}">날짜</span>
            </div>
            <p class="news-title" th:text="${article.title()}">제목</p>
            <p class="news-desc" th:text="${article.description()}" th:if="${article.description() != null}">설명</p>
          </a>
        </li>
      </ul>
    </div>
  </div>

  <nav class="kraft-pagination" aria-label="페이지 이동" th:if="${totalPages > 1}">
    <a class="kraft-page-btn"
       th:href="@{/news(page=${page - 1}, size=${size})}"
       th:classappend="${page == 0} ? ' disabled'"
       th:attr="aria-disabled=${page == 0}"
       aria-label="이전 페이지">&#8249;</a>
    <span class="kraft-page-info"
          th:text="${page + 1} + ' / ' + ${totalPages}">1 / 1</span>
    <a class="kraft-page-btn"
       th:href="@{/news(page=${page + 1}, size=${size})}"
       th:classappend="${page + 1 >= totalPages} ? ' disabled'"
       th:attr="aria-disabled=${page + 1 >= totalPages}"
       aria-label="다음 페이지">&#8250;</a>
  </nav>
</section>
</html>
