<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('번호 빈도', '로또 1회부터 최신 회차까지 번호별 출현 빈도 통계. 자주 나오는 번호와 안 나오는 번호를 한눈에 확인하세요.', ~{::section})}">

  <th:block th:replace="~{fragments/frequency-card :: frequency-card}"></th:block>
