<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이메일 인증 — KRAFT Lotto</title>
</head>
<body style="margin:0;padding:0;background:#f6f1e8;font-family:'Apple SD Gothic Neo',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f6f1e8;padding:32px 16px;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" border="0"
               style="background:#fffaf2;border-radius:12px;overflow:hidden;max-width:560px;width:100%;">

          <!-- 헤더 -->
          <tr>
            <td style="background:#c94f24;padding:24px 32px;">
              <p style="margin:0;font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.3px;">
                KRAFT Lotto
              </p>
            </td>
          </tr>

          <!-- 본문 -->
          <tr>
            <td style="padding:32px;">
              <h1 style="margin:0 0 16px;font-size:22px;font-weight:700;color:#1d1a17;letter-spacing:-0.4px;">
                이메일 인증을 완료해 주세요
              </h1>
              <p style="margin:0 0 24px;font-size:15px;line-height:1.7;color:#5e564c;">
                아래 버튼을 눌러 이메일 주소를 인증하면, 매주 토요일 추첨 후<br>
                저장번호 당첨 여부를 자동으로 알려드립니다.
              </p>
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="border-radius:8px;background:#c94f24;">
                    <a th:href="${verifyUrl}" href="#"
                       style="display:inline-block;padding:14px 28px;font-size:15px;font-weight:600;
                              color:#fff;text-decoration:none;border-radius:8px;letter-spacing:-0.2px;">
                      이메일 인증하기
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:24px 0 0;font-size:13px;color:#9e9086;line-height:1.6;">
                버튼이 작동하지 않으면 아래 URL을 브라우저에 붙여 넣으세요.<br>
                <a th:href="${verifyUrl}" th:text="${verifyUrl}" href="#"
                   style="color:#c94f24;word-break:break-all;"></a>
              </p>
              <hr style="border:none;border-top:1px solid rgba(29,26,23,0.1);margin:28px 0;">
              <p style="margin:0;font-size:13px;color:#9e9086;line-height:1.6;">
                이 이메일은 KRAFT Lotto 저장번호 알림 구독 요청에 의해 발송됐습니다.<br>
                요청하지 않으셨다면 무시하셔도 됩니다.
              </p>
            </td>
          </tr>

          <!-- 푸터 -->
          <tr>
            <td style="background:#efe5d2;padding:16px 32px;">
              <p style="margin:0;font-size:12px;color:#9e9086;">
                © KRAFT Lotto &nbsp;·&nbsp;
                <a th:href="${siteUrl}" href="#"
                   style="color:#9e9086;">kraft.io.kr</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
