<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="|제${round}회 당첨 결과 — KRAFT Lotto|">당첨 결과 — KRAFT Lotto</title>
</head>
<body style="margin:0;padding:0;background:#f6f1e8;font-family:'Apple SD Gothic Neo',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f6f1e8;padding:32px 16px;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" border="0"
               style="background:#fffaf2;border-radius:12px;overflow:hidden;max-width:560px;width:100%;">

          <!-- 헤더 -->
          <tr>
            <td style="background:#c94f24;padding:24px 32px;">
              <p style="margin:0;font-size:13px;color:rgba(255,255,255,0.7);">KRAFT Lotto 당첨 알림</p>
              <p style="margin:4px 0 0;font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.4px;"
                 th:text="|제${round}회 당첨 결과|">제1230회 당첨 결과</p>
              <p style="margin:4px 0 0;font-size:14px;color:rgba(255,255,255,0.8);"
                 th:text="${#temporals.format(drawDate, 'yyyy년 MM월 dd일')}">2026년 06월 27일</p>
            </td>
          </tr>

          <!-- 당첨번호 -->
          <tr>
            <td style="padding:28px 32px 0;">
              <p style="margin:0 0 12px;font-size:13px;font-weight:600;color:#9e9086;letter-spacing:0.5px;text-transform:uppercase;">
                이번 회차 당첨번호
              </p>
              <div>
                <span th:each="n,stat : ${winningNumbers}"
                      th:text="${n}"
                      style="display:inline-block;width:36px;height:36px;border-radius:50%;
                             background:#ffc857;color:#1d1a17;font-weight:700;font-size:14px;
                             text-align:center;line-height:36px;margin-right:6px;">1</span>
                <span th:text="${bonusNumber}"
                      style="display:inline-block;width:36px;height:36px;border-radius:50%;
                             background:#3a7d44;color:#fff;font-weight:700;font-size:14px;
                             text-align:center;line-height:36px;margin-left:4px;">7</span>
                <span style="font-size:11px;color:#9e9086;margin-left:4px;">보너스</span>
              </div>
            </td>
          </tr>

          <!-- 저장번호 결과 -->
          <tr>
            <td style="padding:24px 32px 0;">
              <p style="margin:0 0 12px;font-size:13px;font-weight:600;color:#9e9086;letter-spacing:0.5px;text-transform:uppercase;">
                내 저장번호 대조 결과
              </p>

              <!-- 저장번호 없음 -->
              <p th:if="${savedEntries.isEmpty()}"
                 style="margin:0;font-size:14px;color:#9e9086;">
                저장된 번호가 없습니다.
                <a th:href="${siteUrl + '/saved'}" href="#" style="color:#c94f24;">번호 저장하러 가기 →</a>
              </p>

              <!-- 저장번호 목록 -->
              <table th:unless="${savedEntries.isEmpty()}" width="100%" cellpadding="0" cellspacing="0">
                <tr th:each="entry : ${savedEntries}">
                  <td style="padding:10px 0;border-bottom:1px solid rgba(29,26,23,0.08);">
                    <!-- 번호 볼 -->
                    <div>
                      <span th:each="n : ${entry.numbers}"
                            th:text="${n}"
                            style="display:inline-block;width:28px;height:28px;border-radius:50%;
                                   background:#ffc857;color:#1d1a17;font-weight:600;font-size:12px;
                                   text-align:center;line-height:28px;margin-right:4px;">1</span>
                    </div>
                    <!-- 메모 -->
                    <p th:if="${entry.label}" th:text="${entry.label}"
                       style="margin:4px 0 0;font-size:12px;color:#9e9086;">메모</p>
                    <!-- 결과 -->
                    <p style="margin:6px 0 0;">
                      <strong th:text="${entry.matchCount + '개 일치'}"
                              style="font-size:13px;color:#1d1a17;">0개 일치</strong>
                      <span th:if="${!#strings.equals(entry.rank, '낙첨')}"
                            th:text="| · ${entry.rank}|"
                            style="font-size:13px;color:#c94f24;font-weight:700;"> · 5등</span>
                      <span th:if="${#strings.equals(entry.rank, '낙첨')}"
                            style="font-size:13px;color:#9e9086;"> · 낙첨</span>
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- CTA -->
          <tr>
            <td style="padding:24px 32px 28px;">
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="border-radius:8px;background:#c94f24;">
                    <a th:href="${siteUrl + '/rounds/' + round}" href="#"
                       style="display:inline-block;padding:12px 24px;font-size:14px;font-weight:600;
                              color:#fff;text-decoration:none;border-radius:8px;">
                      회차 상세 보러 가기 →
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- 푸터 -->
          <tr>
            <td style="background:#efe5d2;padding:16px 32px;">
              <p style="margin:0;font-size:12px;color:#9e9086;line-height:1.8;">
                © KRAFT Lotto &nbsp;·&nbsp;
                <a th:href="${siteUrl}" href="#" style="color:#9e9086;">kraft.io.kr</a>
                &nbsp;·&nbsp;
                <a th:href="${unsubscribeUrl}" href="#" style="color:#9e9086;">수신 거부</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
