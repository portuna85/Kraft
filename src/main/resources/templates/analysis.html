<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('번호 조합 분석', '6개의 번호를 선택해 당첨 이력과 출현 빈도를 분석합니다.', ~{::section})}">
<section class="kraft-page">
  <header class="kraft-hero">
    <p class="eyebrow">번호 조합 분석</p>
    <h1>번호 조합 분석</h1>
    <p class="kraft-hero-description">6개의 번호를 선택하면 당첨 이력과 출현 빈도를 분석해 드립니다.</p>
    <p class="kraft-hero-notice small">분석 결과는 과거 데이터 기반입니다. 해당 조합의 당첨 확률을 높이지 않습니다.</p>
  </header>

  <div th:replace="~{fragments/ad-slot :: display('analysis-top')}"></div>

  <div class="card mb-4 kraft-section" id="analysis">
    <div class="card-body">
      <h2 class="card-title h6 text-uppercase fw-semibold text-secondary mb-3">번호 선택</h2>

      <!-- 선택된 볼 표시 -->
      <div class="analysis-selected-row" id="analysis-selected-display">
        <span class="analysis-selected-placeholder">번호를 6개 선택하세요</span>
      </div>

      <!-- 볼 피커 -->
      <div class="ball-picker-grid" id="analysis-picker" aria-label="번호 선택 그리드">
        <th:block th:each="n : ${allNumbers}">
          <button th:replace="~{fragments/ball-picker-item :: item(${n})}">1</button>
        </th:block>
      </div>

      <p class="analysis-hint" id="analysis-hint">6개 선택 시 자동으로 분석됩니다</p>

      <!-- 분석 결과 영역 -->
      <div id="analysis-result" class="analysis-result-area"></div>
    </div>
  </div>

  <script th:src="@{/js/ball-picker.js}" defer></script>
  <script th:src="@{/js/analysis.js}" defer></script>
</section>
</html>
