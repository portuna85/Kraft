<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title,content)">
<head th:with="
  req=${#httpServletRequest},
  reqPath=${(req != null and req.requestURI != null) ? req.requestURI : '/'},
  isAdmin=${#strings.startsWith(reqPath, '/admin')},
  baseUrl=${@environment.getProperty('kraft.public-base-url', 'https://www.kraft.io.kr')},
  canonicalUrl=${baseUrl + reqPath}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="로또 6/45 당첨번호 조회, 분석, 추천 서비스">
  <link rel="canonical" th:href="${canonicalUrl}" th:if="${!isAdmin}">
  <meta name="robots" content="noindex,nofollow,noarchive" th:if="${isAdmin}">
  <meta property="og:type" content="website">
  <meta property="og:title" th:content="${title}">
  <meta property="og:description" content="로또 6/45 당첨번호 조회, 분석, 추천 서비스">
  <meta property="og:url" th:content="${canonicalUrl}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" th:content="${title}">
  <meta name="twitter:description" content="로또 6/45 당첨번호 조회, 분석, 추천 서비스">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#0b3a66">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#061d3a">
  <link rel="icon" th:href="@{/images/favicon.svg}" type="image/svg+xml">
  <link rel="manifest" th:href="@{/manifest.json}">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="최고의 번호">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" th:href="@{/vendor/bootstrap/bootstrap.min.css}">
  <meta name="htmx-config" content='{"includeIndicatorStyles":false}'>
  <script th:src="@{/js/theme-init.js}"></script>
  <link rel="stylesheet" th:href="@{/css/app.css}">
  <link rel="stylesheet" th:href="@{/css/kraft-redesign.css}">
  <title th:text="${title}">최고의 번호</title>
</head>
<body>
<nav class="navbar navbar-expand-md border-bottom sticky-top">
  <div class="container kraft-container">
    <a class="navbar-brand fw-bold" href="/">최고의 번호</a>
    <button id="navToggleBtn" class="navbar-toggler border-0 shadow-none" type="button"
            aria-controls="navMain" aria-expanded="false" aria-label="메뉴 열기">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav me-auto ms-2 gap-1">
        <li class="nav-item"><a class="nav-link" href="/#recommend">번호 추천</a></li>
        <li class="nav-item"><a class="nav-link" href="/#round-search">회차 검색</a></li>
        <li class="nav-item"><a class="nav-link" href="/#frequency">빈도</a></li>
        <li class="nav-item"><a class="nav-link" href="/#rounds">회차 목록</a></li>
      </ul>
      <button id="theme-btn" class="btn btn-sm btn-outline-secondary ms-auto mt-2 mt-md-0" type="button"
              aria-label="테마 전환" aria-pressed="false">다크</button>
    </div>
  </div>
</nav>
<main class="kraft-main" th:insert="${content}"></main>
<nav class="kraft-bottom-nav d-md-none"
     aria-label="섹션 바로가기"
     th:if="${#httpServletRequest == null or #httpServletRequest.requestURI == null or !#strings.startsWith(#httpServletRequest.requestURI, '/admin')}">
  <a href="#latest" class="kraft-bottom-nav-item">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path stroke-linecap="round" d="M12 7v5l3 3"/></svg>
    <span>최신</span>
  </a>
  <a href="#recommend" class="kraft-bottom-nav-item">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
    <span>추천</span>
  </a>
  <a href="#round-search" class="kraft-bottom-nav-item">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>
    <span>검색</span>
  </a>
  <a href="#frequency" class="kraft-bottom-nav-item">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.5V19h4.5v-5.5M9.75 9V19h4.5V9M16.5 4.5V19H21V4.5"/></svg>
    <span>빈도</span>
  </a>
  <a href="#rounds" class="kraft-bottom-nav-item">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" d="M8.25 6.75h11.5M8.25 12h11.5M8.25 17.25h11.5M3.75 6.75h.008M3.75 12h.008M3.75 17.25h.008"/></svg>
    <span>회차</span>
  </a>
</nav>
<script th:src="@{/vendor/htmx/htmx.min.js}"></script>
<script th:src="@{/js/theme.js}"></script>
<script th:src="@{/js/validation.js}"></script>
<script th:src="@{/js/bottom-nav.js}"></script>
<script th:src="@{/js/fragment-loader.js}"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
