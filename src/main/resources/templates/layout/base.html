<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title,description,content)"
      th:with="reqPath=${currentPath != null ? currentPath : '/'},
               isAdmin=${#strings.startsWith(reqPath, '/admin')},
               baseUrl=${@environment.getProperty('kraft.public-base-url', 'https://www.kraft.io.kr')},
               canonicalUrl=${baseUrl + reqPath}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" th:content="${description}">
  <link rel="canonical" th:href="${canonicalUrl}" th:if="${!isAdmin}">
  <meta name="naver-site-verification" content="2cee6588f949ded613ff945305c892d82c130eb8">
  <meta name="robots" content="noindex,nofollow,noarchive" th:if="${isAdmin or (noindex != null and noindex)}">
  <meta property="og:type" content="website">
  <meta property="og:title" th:content="${title}">
  <meta property="og:description" th:content="${description}">
  <meta property="og:url" th:content="${canonicalUrl}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" th:content="${title}">
  <meta name="twitter:description" th:content="${description}">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#0b3a66">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#061d3a">
  <link rel="icon" th:href="@{/images/favicon.svg}" type="image/svg+xml">
  <link rel="manifest" th:href="@{/manifest.json}">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="KRAFT Lotto">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" th:href="@{/vendor/bootstrap/bootstrap.min.css}">
  <meta name="htmx-config" content='{"includeIndicatorStyles":false}'>
  <script th:src="@{/js/theme-init.js}"></script>
  <link rel="stylesheet" th:href="@{/css/app.css}">
  <link rel="stylesheet" th:href="@{/css/kraft-redesign.css}">
  <link rel="stylesheet" th:href="@{/css/lotto-ball.css}">
  <title th:text="${title}">KRAFT Lotto</title>
  <script type="application/ld+json" th:inline="text" th:attr="nonce=${cspNonce}" th:unless="${isAdmin}">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "KRAFT Lotto",
    "url": "[[${baseUrl}]]",
    "description": "로또 당첨번호 조회, 빈도·패턴 통계, 편향 회피 번호 조합 도구"
  }
  </script>
</head>
<body>
<a class="skip-to-content" href="#main-content">본문으로 건너뛰기</a>
<nav class="navbar navbar-expand-md border-bottom sticky-top">
  <div class="container kraft-container">
    <a class="navbar-brand fw-bold" href="/">KRAFT Lotto</a>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav me-auto ms-2 gap-1">
        <li class="nav-item">
          <a class="nav-link" th:classappend="${reqPath == '/' or reqPath == '/recommend'} ? 'active'" href="/"
             th:attr="aria-current=${reqPath == '/' or reqPath == '/recommend' ? 'page' : null}">번호 추천</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${reqPath == '/latest'} ? 'active'" href="/latest"
             th:attr="aria-current=${reqPath == '/latest' ? 'page' : null}">최신회차</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${reqPath == '/rounds'} ? 'active'" href="/rounds"
             th:attr="aria-current=${reqPath == '/rounds' ? 'page' : null}">회차검색</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${reqPath == '/frequency'} ? 'active'" href="/frequency"
             th:attr="aria-current=${reqPath == '/frequency' ? 'page' : null}">빈도</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${reqPath == '/stats'} ? 'active'" href="/stats"
             th:attr="aria-current=${reqPath == '/stats' ? 'page' : null}">패턴</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${reqPath == '/analysis'} ? 'active'" href="/analysis"
             th:attr="aria-current=${reqPath == '/analysis' ? 'page' : null}">분석</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${reqPath == '/companion'} ? 'active'" href="/companion"
             th:attr="aria-current=${reqPath == '/companion' ? 'page' : null}">동반출현</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${reqPath == '/news'} ? 'active'" href="/news"
             th:attr="aria-current=${reqPath == '/news' ? 'page' : null}">뉴스</a>
        </li>
      </ul>
    </div>
    <button id="theme-btn" class="theme-toggle-btn ms-auto" type="button"
            aria-label="다크 테마로 전환" aria-pressed="false">
      <!-- 다크모드일 때: 해 아이콘, 라이트모드일 때: 달 아이콘 -->
      <svg id="theme-icon-moon" class="theme-icon" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg id="theme-icon-sun" class="theme-icon theme-icon--hidden" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </div>
</nav>
<main id="main-content" class="kraft-main" th:insert="${content}"></main>

</html>
