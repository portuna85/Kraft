<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title,description,content)"
      th:with="req=${#httpServletRequest},
               reqPath=${(req != null and req.requestURI != null) ? req.requestURI : '/'},
               isAdmin=${#strings.startsWith(reqPath, '/admin')},
               baseUrl=${@environment.getProperty('kraft.public-base-url', 'https://www.kraft.io.kr')},
               canonicalUrl=${baseUrl + reqPath}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" th:content="${description}">
  <link rel="canonical" th:href="${canonicalUrl}" th:if="${!isAdmin}">
  <meta name="naver-site-verification" content="2cee6588f949ded613ff945305c892d82c130eb8">
  <meta name="robots" content="noindex,nofollow,noarchive" th:if="${isAdmin}">
  <meta property="og:type" content="website">
  <meta property="og:title" th:content="${title}">
  <meta property="og:description" th:content="${description}">
  <meta property="og:url" th:content="${canonicalUrl}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" th:content="${title}">
  <meta name="twitter:description" th:content="${description}">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#0b3a66">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#061d3a">
  <link rel="icon" th:href="@{/images/favicon.svg}" type="image/svg+xml">
  <link rel="manifest" th:href="@{/manifest.json}">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="최고의 번호">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" th:href="@{/vendor/bootstrap/bootstrap.min.css}">
  <meta name="htmx-config" content='{"includeIndicatorStyles":false}'>
  <script th:src="@{/js/theme-init.js}"></script>
  <link rel="stylesheet" th:href="@{/css/app.css}">
  <link rel="stylesheet" th:href="@{/css/kraft-redesign.css}">
  <link rel="stylesheet" th:href="@{/css/lotto-ball.css}">
  <title th:text="${title}">최고의 번호</title>
</head>
<body>
<nav class="navbar navbar-expand-md border-bottom sticky-top">
  <div class="container kraft-container">
    <a class="navbar-brand fw-bold" href="/">최고의 번호</a>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav me-auto ms-2 gap-1">
        <li class="nav-item">
          <a class="nav-link" th:classappend="${reqPath == '/' or reqPath == '/recommend'} ? 'active'" href="/"
             th:attr="aria-current=${reqPath == '/' or reqPath == '/recommend' ? 'page' : null}">번호 추천</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${reqPath == '/frequency'} ? 'active'" href="/frequency"
             th:attr="aria-current=${reqPath == '/frequency' ? 'page' : null}">빈도</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${reqPath == '/stats'} ? 'active'" href="/stats"
             th:attr="aria-current=${reqPath == '/stats' ? 'page' : null}">패턴</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${reqPath == '/analysis'} ? 'active'" href="/analysis"
             th:attr="aria-current=${reqPath == '/analysis' ? 'page' : null}">분석</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${reqPath == '/companion'} ? 'active'" href="/companion"
             th:attr="aria-current=${reqPath == '/companion' ? 'page' : null}">궁합</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${reqPath == '/rounds'} ? 'active'" href="/rounds"
             th:attr="aria-current=${reqPath == '/rounds' ? 'page' : null}">회차</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${reqPath == '/news'} ? 'active'" href="/news"
             th:attr="aria-current=${reqPath == '/news' ? 'page' : null}">뉴스</a>
        </li>
      </ul>
    </div>
    <button id="theme-btn" class="theme-toggle-btn ms-auto" type="button"
            aria-label="다크 테마로 전환" aria-pressed="false">
      <!-- 다크모드일 때: 해 아이콘, 라이트모드일 때: 달 아이콘 -->
      <svg id="theme-icon-moon" class="theme-icon" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg id="theme-icon-sun" class="theme-icon theme-icon--hidden" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </div>
</nav>
<main class="kraft-main" th:insert="${content}"></main>
<div id="fragment-live-region" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>
<nav class="kraft-bottom-nav d-md-none" aria-label="메뉴" th:if="${!isAdmin}">
  <a href="/" class="kraft-bottom-nav-item"
     th:classappend="${reqPath == '/' or reqPath == '/recommend'} ? ' active'"
     th:attr="aria-current=${reqPath == '/' or reqPath == '/recommend' ? 'page' : null}">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
    <span>추천</span>
  </a>
  <a href="/frequency" class="kraft-bottom-nav-item"
     th:classappend="${reqPath == '/frequency'} ? ' active'"
     th:attr="aria-current=${reqPath == '/frequency' ? 'page' : null}">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.5V19h4.5v-5.5M9.75 9V19h4.5V9M16.5 4.5V19H21V4.5"/></svg>
    <span>빈도</span>
  </a>
  <a href="/stats" class="kraft-bottom-nav-item"
     th:classappend="${reqPath == '/stats'} ? ' active'"
     th:attr="aria-current=${reqPath == '/stats' ? 'page' : null}">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.562.562 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg>
    <span>패턴</span>
  </a>
  <a href="/analysis" class="kraft-bottom-nav-item"
     th:classappend="${reqPath == '/analysis'} ? ' active'"
     th:attr="aria-current=${reqPath == '/analysis' ? 'page' : null}">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
    <span>분석</span>
  </a>
  <a href="/companion" class="kraft-bottom-nav-item"
     th:classappend="${reqPath == '/companion'} ? ' active'"
     th:attr="aria-current=${reqPath == '/companion' ? 'page' : null}">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>
    <span>궁합</span>
  </a>
</nav>
<script th:src="@{/vendor/htmx/htmx.min.js}"></script>
<script th:src="@{/js/theme.js}"></script>
<script th:src="@{/js/validation.js}"></script>
<script th:src="@{/js/fragment-loader.js}"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
