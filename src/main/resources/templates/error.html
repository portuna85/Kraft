<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(${(errorTitle != null ? errorTitle : 'Error') + ' - Top Lotto'}, ~{::section})}">
<head>
  <title th:text="${errorTitle != null ? errorTitle : 'Error'} + ' - Top Lotto'">Error - Top Lotto</title>
</head>
<body>
<section class="container kraft-container py-5">
  <div class="text-center py-5">
    <h1 class="display-6 fw-semibold text-danger"
        th:text="${errorTitle != null ? errorTitle : 'Something went wrong'}">Something went wrong</h1>
    <p class="text-secondary mt-2"
       th:text="${errorMessage != null ? errorMessage : 'Please try again later.'}">Please try again later.</p>
    <a class="btn btn-outline-primary mt-3" href="/">Back to home</a>
  </div>
</section>
</body>
</html>
