<div class="card mb-4 kraft-section" id="stats" th:fragment="stats-card">
  <div class="card-body">

    <p class="small text-secondary mb-3 kraft-stat-disclaimer">
      통계 수치는 과거 당첨 결과의 분포를 설명합니다. 다음 회차의 당첨 확률 예측 근거가 아닙니다.
    </p>

    <!-- 홀짝 분포 -->
    <h2 class="card-title h6 text-uppercase fw-semibold text-secondary mb-3">홀짝 분포</h2>
    <p class="stats-desc text-secondary small mb-3">홀수(1,3,5…)와 짝수(2,4,6…)의 조합 빈도</p>

    <div class="stats-oddeven-list">
      <div th:each="s : ${stats.oddEvenStats}" class="stats-oddeven-row">
        <div class="stats-oddeven-label">
          <span class="stats-tag stats-tag--hot" th:text="${s.oddCount} + '홀'">3홀</span>
          <span class="stats-tag stats-tag--cold" th:text="${s.evenCount} + '짝'">3짝</span>
        </div>
        <div class="stats-ball-row">
          <th:block th:each="i : ${#numbers.sequence(1, s.oddCount)}">
            <span class="stats-ball stats-ball--odd" aria-hidden="true"></span>
          </th:block>
          <th:block th:each="i : ${#numbers.sequence(1, s.evenCount)}">
            <span class="stats-ball stats-ball--even" aria-hidden="true"></span>
          </th:block>
        </div>
        <span class="stats-count" th:text="${s.drawCount} + '회'">100회</span>
        <span class="stats-pct" th:text="${#numbers.formatDecimal(s.percent,1,1)} + '%'">10.0%</span>
        <span class="stats-theoretical"
              th:title="|이론값: ${#numbers.formatDecimal(s.theoreticalPercent,1,1)}%|"
              th:text="|이론 ${#numbers.formatDecimal(s.theoreticalPercent,1,1)}%|">이론 10.0%</span>
      </div>
    </div>

    <div class="freq-summary-sep my-4"></div>

    <!-- 합산 범위 분포 -->
    <h2 class="card-title h6 text-uppercase fw-semibold text-secondary mb-3">합산 범위 분포</h2>
    <p class="stats-desc text-secondary small mb-3">당첨 번호 6개의 합산 범위별 출현 빈도</p>

    <div class="stats-sum-list">
      <div th:each="s : ${stats.sumRangeStats}" class="stats-sum-row"
           th:with="rawDots=${s.maxDrawCount > 0 ? (s.drawCount * 10 / s.maxDrawCount) : 0},
                    filledDots=${rawDots > 0 ? rawDots : (s.drawCount > 0 ? 1 : 0)}">
        <span class="stats-sum-range font-monospace"
              th:text="${s.rangeStart} + '~' + ${s.rangeEnd}">100~109</span>
        <div class="stats-dot-row" aria-hidden="true">
          <th:block th:each="i : ${#numbers.sequence(1, 10)}">
            <span class="stat-dot" th:classappend="${i <= filledDots} ? ' stat-dot--filled'"></span>
          </th:block>
        </div>
        <span class="stats-count" th:text="${s.drawCount} + '회'">100회</span>
        <span class="stats-pct" th:text="${#numbers.formatDecimal(s.percent,1,1)} + '%'">10.0%</span>
        <span class="stats-theoretical"
              th:if="${s.theoreticalPercent > 0}"
              th:title="|이론값: ${#numbers.formatDecimal(s.theoreticalPercent,1,1)}%|"
              th:text="|이론 ${#numbers.formatDecimal(s.theoreticalPercent,1,1)}%|">이론 10.0%</span>
      </div>
    </div>

    <p class="text-secondary small mt-3 mb-0">전체 <span th:text="${stats.totalDraws}">0</span>회차 기준</p>
  </div>
</div>
