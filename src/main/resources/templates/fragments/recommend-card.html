<div class="card mb-4 kraft-section kraft-section-recommend" id="recommend" th:fragment="recommend-card">
  <div class="card-body">
    <h2 class="card-title h6 text-uppercase fw-semibold text-secondary mb-3">번호 추천</h2>
    <form class="kraft-inline-form kraft-inline-form-count mb-3" id="recommendForm" method="get" th:action="@{/recommend}" hx-get="/fragments/recommend" hx-target="#recommend" hx-swap="outerHTML" hx-indicator="#recommend-loading">
      <label class="kraft-inline-label" for="countInput" th:text="|세트 수 (1~${maxCount})|">세트 수 (1~10)</label>
      <input id="countInput" class="form-control form-control-sm kraft-number-input" th:attr="max=${maxCount}" min="1" name="count" required aria-required="true" aria-describedby="countInputFeedback" th:value="${count}" type="number" inputmode="numeric" pattern="[0-9]*">
      <input type="hidden" name="oddCount" id="filterOddCount" th:value="${filterOddCount}">
      <input type="hidden" name="sumMin"   id="filterSumMin"   th:value="${filterSumMin}">
      <input type="hidden" name="sumMax"   id="filterSumMax"   th:value="${filterSumMax}">
      <button class="btn btn-sm btn-primary kraft-submit-btn" type="submit">생성</button>
    </form>

    <!-- 필터 옵션 -->
    <div class="recommend-filters mb-3">
      <div class="filter-group">
        <span class="filter-group-label">홀짝</span>
        <div class="filter-btn-row" id="filterOddBtns">
          <button type="button" class="filter-btn" th:classappend="${filterOddCount == null} ? ' active'" data-target="filterOddCount" data-value="">전체</button>
          <button type="button" class="filter-btn" th:classappend="${filterOddCount == 0}    ? ' active'" data-target="filterOddCount" data-value="0">0홀</button>
          <button type="button" class="filter-btn" th:classappend="${filterOddCount == 1}    ? ' active'" data-target="filterOddCount" data-value="1">1홀</button>
          <button type="button" class="filter-btn" th:classappend="${filterOddCount == 2}    ? ' active'" data-target="filterOddCount" data-value="2">2홀</button>
          <button type="button" class="filter-btn" th:classappend="${filterOddCount == 3}    ? ' active'" data-target="filterOddCount" data-value="3">3홀</button>
          <button type="button" class="filter-btn" th:classappend="${filterOddCount == 4}    ? ' active'" data-target="filterOddCount" data-value="4">4홀</button>
          <button type="button" class="filter-btn" th:classappend="${filterOddCount == 5}    ? ' active'" data-target="filterOddCount" data-value="5">5홀</button>
          <button type="button" class="filter-btn" th:classappend="${filterOddCount == 6}    ? ' active'" data-target="filterOddCount" data-value="6">6홀</button>
        </div>
      </div>
      <div class="filter-group mt-2">
        <span class="filter-group-label">합산</span>
        <div class="filter-btn-row" id="filterSumBtns">
          <button type="button" class="filter-btn" th:classappend="${filterSumMin == null}  ? ' active'"
                  data-sum-min="" data-sum-max="">전체</button>
          <button type="button" class="filter-btn" th:classappend="${filterSumMin == 21}    ? ' active'"
                  data-sum-min="21"  data-sum-max="100">낮음 ≤100</button>
          <button type="button" class="filter-btn" th:classappend="${filterSumMin == 101}   ? ' active'"
                  data-sum-min="101" data-sum-max="130">중저 101~130</button>
          <button type="button" class="filter-btn" th:classappend="${filterSumMin == 131}   ? ' active'"
                  data-sum-min="131" data-sum-max="160">중고 131~160</button>
          <button type="button" class="filter-btn" th:classappend="${filterSumMin == 161}   ? ' active'"
                  data-sum-min="161" data-sum-max="255">높음 ≥161</button>
        </div>
      </div>
    </div>

    <p class="small text-secondary mb-2">생성할 번호 세트 수를 입력하세요.</p>
    <p class="small text-secondary mb-2 kraft-recommend-disclaimer">
      확률 예측이 아닌 편향 회피 도구입니다.
      생일·연속수·등차 등 많은 사람이 고르는 조합을 걸러
      공동 당첨 시 분배 인원을 줄이는 데 목적이 있습니다.
      모든 조합의 1등 당첨 확률은 동일합니다(1/8,145,060).
    </p>
    <div id="countInputFeedback" class="invalid-feedback d-block kraft-input-feedback visually-hidden" aria-live="polite" th:text="|1 ~ ${maxCount} 사이의 정수를 입력하세요.|">1 ~ 10 사이의 정수를 입력하세요.</div>
    <div id="recommend-loading" class="htmx-indicator kraft-state kraft-state-loading small">생성 중…</div>
    <div class="sets-grid" th:if="${combinations != null and !#lists.isEmpty(combinations)}">
      <div th:each="c, stat : ${combinations}" class="set-card">
        <span class="set-index" th:text="'#' + ${stat.count}"></span>
        <div class="ball-row">
          <th:block th:each="n : ${c.numbers}">
            <span th:replace="~{fragments/lotto-ball :: ball(${n}, '')}">1</span>
          </th:block>
        </div>
        <details class="set-card-analysis" th:if="${not #lists.isEmpty(c.passedLabels)}">
          <summary class="set-card-analysis-toggle small text-secondary">편향 회피 분석</summary>
          <ul class="set-card-analysis-list">
            <li th:each="label : ${c.passedLabels}" class="set-card-analysis-item">
              <span class="set-card-analysis-check" aria-hidden="true">✓</span>
              <span th:text="${label}">label</span>
            </li>
          </ul>
        </details>
      </div>
    </div>
    <!-- 고급 설정: 규칙 on/off -->
    <details class="mt-3 recommend-advanced" id="recommendAdvanced">
      <summary class="kraft-summary-trigger text-secondary small">고급 설정 (편향 회피 규칙 선택)</summary>
      <div class="mt-2 recommend-rule-list" id="recommendRuleCheckboxes">
        <p class="small text-secondary mb-2">체크 해제한 규칙은 번호 생성 시 적용되지 않습니다.</p>
        <div th:each="r : ${rules}" class="recommend-rule-item">
          <label class="recommend-rule-label">
            <input type="checkbox"
                   class="recommend-rule-checkbox"
                   th:data-rule-name="${r.name()}"
                   th:checked="${not disabledRules.contains(r.name())}"
                   th:attr="aria-label=${r.name()}">
            <span class="recommend-rule-name" th:text="${r.name()}">rule</span>
            <span class="recommend-rule-reason text-secondary small" th:text="${r.reason()}">reason</span>
          </label>
        </div>
      </div>
    </details>
  </div>
</div>
