<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div class="card mb-4 kraft-section kraft-section-latest" id="latest" th:fragment="latest-card">
  <div class="card-body">
    <h2 class="card-title h6 text-uppercase fw-semibold text-secondary mb-3">&#52572;&#49888; &#54924;&#52264;</h2>
    <div th:if="${latest != null}">
      <div class="d-flex align-items-center gap-2 mb-2">
        <span class="fw-semibold" th:text="${latest.round + '&#54924; &#45817;&#52392;&#48264;&#54840;'}">0&#54924; &#45817;&#52392;&#48264;&#54840;</span>
        <span class="badge bg-warning text-dark small fw-normal"
              th:if="${latest.round < expectedRound}"
              th:text="${(expectedRound - latest.round) + '&#54924; &#48120;&#49688;&#51665;'}">N&#54924; &#48120;&#49688;&#51665;</span>
      </div>
      <div class="kraft-balls mb-3">
        <th:block th:each="n : ${latest.numbers}">
          <span th:replace="~{fragments/lotto-ball :: ball(${n}, '')}">1</span>
        </th:block>
        <span class="kraft-bonus-group">
          <span class="kraft-ball-plus" aria-hidden="true">+</span>
          <span th:replace="~{fragments/lotto-ball :: ball(${latest.bonusNumber}, 'bonus ')}">0</span>
        </span>
      </div>
      <div class="kraft-draw-meta">
        <div class="kraft-meta-item">
          <span class="kraft-meta-label">&#52628;&#52392;&#51068;</span>
          <span class="kraft-meta-value" th:text="${#temporals.format(latest.drawDate,'yyyy.MM.dd')}">-</span>
        </div>
        <div class="kraft-meta-item">
          <span class="kraft-meta-label">1&#46321; &#45817;&#52392;&#44552;</span>
          <span class="kraft-meta-value font-monospace"
                th:text="${#numbers.formatInteger(latest.firstPrize,1,'COMMA') + '&#50896;'}">0&#50896;</span>
        </div>
        <div class="kraft-meta-item">
          <span class="kraft-meta-label">1&#46321; &#45817;&#52392;&#51088;</span>
          <span class="kraft-meta-value" th:text="${latest.firstWinners + '&#47749;'}">0&#47749;</span>
        </div>
      </div>
    </div>
    <p class="text-secondary mb-0" th:if="${latest == null}">
      &#50500;&#51649; &#49688;&#51665;&#46108; &#54924;&#52264; &#45936;&#51060;&#53552;&#44032; &#50630;&#49845;&#45768;&#45796;.
    </p>
  </div>
</div>
</body>
</html>
