<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div class="card mb-4 kraft-section kraft-section-frequency" id="frequency" th:fragment="frequency-card">
  <div class="card-body">
    <h2 class="card-title h6 text-uppercase fw-semibold text-secondary mb-3">Number Frequency</h2>
    <div class="kraft-freq-grid">
      <div class="kraft-freq-cell" th:each="f : ${frequency}">
        <span th:replace="~{fragments/lotto-ball :: ball(${f.number}, '')}">1</span>
        <progress class="bar" th:attr="max=${maxFreq},value=${f.count},aria-label=|Number ${f.number} frequency|"></progress>
        <small th:text="${f.count}" th:attr="aria-label=|Number ${f.number} appears ${f.count} times|">0</small>
      </div>
    </div>
  </div>
</div>
</body>
</html>
