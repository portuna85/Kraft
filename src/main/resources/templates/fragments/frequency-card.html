<div class="card mb-4 kraft-section kraft-section-frequency" id="frequency" th:fragment="frequency-card">
  <div class="card-body">
    <h2 class="card-title h6 text-uppercase fw-semibold text-secondary mb-3">번호 출현 빈도</h2>
    <p class="small text-secondary mb-3 kraft-stat-disclaimer">
      출현 빈도는 과거 당첨 결과를 집계한 값입니다. 과거에 많이 나온 번호가 다음 회차에 더 잘 나오는 것은 아닙니다.
    </p>

    <!-- 상위/하위 6개 볼 요약 -->
    <div class="freq-summary-section">
      <div class="freq-summary-group">
        <div class="freq-summary-header">
          <span class="freq-summary-title freq-summary-title--hot">자주 나온 번호</span>
          <span th:if="${top6History != null and top6History.firstPrizeCount > 0}"
                class="freq-prize-badge freq-prize-badge--hit"
                th:text="${top6History.firstPrizeCount} + '회 1등'">1회 1등</span>
          <span th:if="${top6History == null or top6History.firstPrizeCount == 0}"
                class="freq-prize-badge freq-prize-badge--none">1등 없음</span>
        </div>
        <div class="ball-row freq-summary-ball-row">
          <th:block th:each="vm : ${topBalls}">
            <div class="freq-summary-ball-wrap">
              <span th:replace="~{fragments/lotto-ball :: ball(${vm.number}, '')}">1</span>
              <span class="freq-summary-count" th:text="${vm.count}">100</span>
            </div>
          </th:block>
          <th:block th:if="${topBonus != null}">
            <span class="freq-summary-plus" aria-hidden="true">+</span>
            <div class="freq-summary-ball-wrap">
              <span th:replace="~{fragments/lotto-ball :: ball(${topBonus.number}, 'bonus ')}">7</span>
              <span class="freq-summary-count" th:text="${topBonus.count}">90</span>
            </div>
          </th:block>
        </div>
      </div>
      <div class="freq-summary-sep"></div>
      <div class="freq-summary-group">
        <div class="freq-summary-header">
          <span class="freq-summary-title freq-summary-title--cold">드물게 나온 번호</span>
          <span th:if="${bottom6History != null and bottom6History.firstPrizeCount > 0}"
                class="freq-prize-badge freq-prize-badge--hit"
                th:text="${bottom6History.firstPrizeCount} + '회 1등'">1회 1등</span>
          <span th:if="${bottom6History == null or bottom6History.firstPrizeCount == 0}"
                class="freq-prize-badge freq-prize-badge--none">1등 없음</span>
        </div>
        <div class="ball-row freq-summary-ball-row">
          <th:block th:each="vm : ${bottomBalls}">
            <div class="freq-summary-ball-wrap">
              <span th:replace="~{fragments/lotto-ball :: ball(${vm.number}, '')}">1</span>
              <span class="freq-summary-count" th:text="${vm.count}">50</span>
            </div>
          </th:block>
          <th:block th:if="${bottomBonus != null}">
            <span class="freq-summary-plus" aria-hidden="true">+</span>
            <div class="freq-summary-ball-wrap">
              <span th:replace="~{fragments/lotto-ball :: ball(${bottomBonus.number}, 'bonus ')}">9</span>
              <span class="freq-summary-count" th:text="${bottomBonus.count}">55</span>
            </div>
          </th:block>
        </div>
      </div>
    </div>

    <!-- 기간 필터 -->
    <div class="freq-period-tabs" role="tablist" aria-label="조회 기간">
      <a class="btn-period" href="/frequency?period=0" th:classappend="${period == 0} ? ' active'" role="tab"
         hx-get="/fragments/frequency?period=0" hx-target="#frequency" hx-swap="outerHTML">전체</a>
      <a class="btn-period" href="/frequency?period=200" th:classappend="${period == 200} ? ' active'" role="tab"
         hx-get="/fragments/frequency?period=200" hx-target="#frequency" hx-swap="outerHTML">최근 200회</a>
      <a class="btn-period" href="/frequency?period=100" th:classappend="${period == 100} ? ' active'" role="tab"
         hx-get="/fragments/frequency?period=100" hx-target="#frequency" hx-swap="outerHTML">최근 100회</a>
      <a class="btn-period" href="/frequency?period=50" th:classappend="${period == 50} ? ' active'" role="tab"
         hx-get="/fragments/frequency?period=50" hx-target="#frequency" hx-swap="outerHTML">최근 50회</a>
    </div>

    <div class="freq-controls">
      <button class="btn-sort active" data-sort="number" type="button">번호순</button>
      <button class="btn-sort" data-sort="count-desc" type="button">많은 순</button>
      <button class="btn-sort" data-sort="count-asc" type="button">적은 순</button>
    </div>
    <ul class="freq-list freq-grid" id="freq-list">
      <li th:each="f : ${frequency}"
          class="freq-item"
          th:attr="data-number=${f.number}, data-count=${f.count}">
        <span th:replace="~{fragments/lotto-ball :: ball(${f.number}, '')}">1</span>
        <span class="freq-count"
              th:text="${f.count}"
              th:attr="aria-label=|${f.number}번 ${f.count}회 출현|"></span>
      </li>
    </ul>
  </div>
</div>
