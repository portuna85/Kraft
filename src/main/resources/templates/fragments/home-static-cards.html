<div xmlns:th="http://www.thymeleaf.org" class="card mb-4 kraft-section kraft-section-latest" id="latest" th:fragment="latest-card">
  <div class="card-body">
    <h2 class="card-title h6 text-uppercase fw-semibold text-secondary mb-3">理쒖떊 ?뚯감</h2>
    <div th:if="${latest != null}">
      <div class="d-flex align-items-center gap-2 mb-2">
        <span class="fw-semibold" th:text="${latest.round + '???뱀꺼踰덊샇'}">0???뱀꺼踰덊샇</span>
        <span class="badge bg-warning text-dark small fw-normal" th:if="${latest.round < expectedRound}" th:text="${(expectedRound - latest.round) + '??誘몄닔吏?}">N??誘몄닔吏?/span>
      </div>
      <div class="kraft-balls mb-3">
        <th:block th:each="n : ${latest.numbers}"><span th:replace="~{fragments/lotto-ball :: ball(${n}, '')}">1</span></th:block>
        <span class="kraft-bonus-group"><span class="kraft-ball-plus" aria-hidden="true">+</span><span th:replace="~{fragments/lotto-ball :: ball(${latest.bonusNumber}, 'bonus ')}">0</span></span>
      </div>
      <div class="kraft-draw-meta">
        <div class="kraft-meta-item"><span class="kraft-meta-label">異붿꺼??/span><span class="kraft-meta-value" th:text="${#temporals.format(latest.drawDate,'yyyy.MM.dd')}">-</span></div>
        <div class="kraft-meta-item"><span class="kraft-meta-label">1???뱀꺼湲?/span><span class="kraft-meta-value font-monospace" th:text="${#numbers.formatInteger(latest.firstPrize,1,'COMMA') + ' ??}">0 ??/span></div>
        <div class="kraft-meta-item"><span class="kraft-meta-label">?뱀꺼????/span><span class="kraft-meta-value" th:text="${latest.firstWinners + '紐?}">0紐?/span></div>
      </div>
    </div>
    <p class="text-secondary mb-0" th:if="${latest == null}">?섏쭛???뚯감 ?곗씠?곌? ?놁뒿?덈떎.</p>
  </div>
</div>

<div xmlns:th="http://www.thymeleaf.org" class="card mb-4 kraft-section kraft-section-round-search" id="round-search" th:fragment="round-search-card">
  <div class="card-body">
    <h2 class="card-title h6 text-uppercase fw-semibold text-secondary mb-3">?뚯감 寃??/h2>
    <form class="kraft-inline-form kraft-inline-form-round mb-3" id="roundSearchForm" method="get" th:action="@{/}">
      <label class="kraft-inline-label" for="roundInput">?뚯감</label>
      <input id="roundInput" class="form-control form-control-sm kraft-round-input" th:attr="max=${maxRound}" min="1" name="round" required aria-required="true" aria-describedby="roundInputFeedback" th:value="${round}" type="number" inputmode="numeric" pattern="[0-9]*">
      <button class="btn btn-sm btn-outline-primary kraft-submit-btn" type="submit">寃??/button>
    </form>
    <div id="roundInputFeedback" class="invalid-feedback d-block kraft-input-feedback visually-hidden" aria-live="polite" th:text="|1 ~ ${maxRound} ?ъ씠???뺤닔瑜??낅젰?섏꽭??|">1 ~ 3000 ?ъ씠???뺤닔瑜??낅젰?섏꽭??</div>
    <div th:if="${result != null}">
      <dl class="row g-2 mb-3">
        <dt class="col-5 col-sm-3 fw-normal text-secondary">?뚯감</dt>
        <dd class="col-7 col-sm-9 mb-0 fw-semibold" th:text="${result.round + '??}">0??/dd>
        <dt class="col-5 col-sm-3 fw-normal text-secondary">異붿꺼??/dt>
        <dd class="col-7 col-sm-9 mb-0" th:text="${#temporals.format(result.drawDate,'yyyy.MM.dd')}">-</dd>
        <dt class="col-5 col-sm-3 fw-normal text-secondary">1???뱀꺼湲?/dt>
        <dd class="col-7 col-sm-9 mb-0 font-monospace" th:text="${#numbers.formatInteger(result.firstPrize,1,'COMMA') + ' ??}">0 ??/dd>
        <dt class="col-5 col-sm-3 fw-normal text-secondary">?뱀꺼????/dt>
        <dd class="col-7 col-sm-9 mb-0" th:text="${result.firstWinners + '紐?}">0紐?/dd>
      </dl>
      <div class="kraft-balls">
        <th:block th:each="n : ${result.numbers}">
          <span th:replace="~{fragments/lotto-ball :: ball(${n}, '')}">1</span>
        </th:block>
        <span class="kraft-bonus-group">
          <span class="kraft-ball-plus" aria-hidden="true">+</span>
          <span th:replace="~{fragments/lotto-ball :: ball(${result.bonusNumber}, 'bonus ')}">0</span>
        </span>
      </div>
    </div>
  </div>
</div>
