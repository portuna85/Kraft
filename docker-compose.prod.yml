# base(docker-compose.yml)와 완전히 동일하게 유지돼야 하는 env 값들.
# 두 파일이 각자 파일 안에서만 앵커를 정의하므로(YAML은 파일 간 앵커 공유를 지원하지 않음)
# 값을 바꿀 때는 반드시 docker-compose.yml의 동일 블록도 함께 확인할 것.
# KRAFT_SECURITY_TRUSTED_PROXY_CIDR은 여기 없음 — base/prod의 네트워크 토폴로지가 달라
# (base: 단일 kraft-net, prod: edge/app/monitoring/egress 분리) 기본값이 의도적으로 다르다.
x-backend-common-env: &backend-common-env
  KRAFT_OPS_TOKEN: ${KRAFT_OPS_TOKEN:-}
  KRAFT_REVALIDATE_SECRET: ${KRAFT_REVALIDATE_SECRET:-}
  KRAFT_REVALIDATE_WEB_URL: ${KRAFT_REVALIDATE_WEB_URL:-http://web:3000}
  KRAFT_SAVED_MAX_PER_CLIENT: ${KRAFT_SAVED_MAX_PER_CLIENT:-100}
  KRAFT_ADMIN_BOOTSTRAP_USERNAME: ${KRAFT_ADMIN_BOOTSTRAP_USERNAME:-}
  KRAFT_ADMIN_BOOTSTRAP_PASSWORD: ${KRAFT_ADMIN_BOOTSTRAP_PASSWORD:-}
  KRAFT_EXTERNAL_LOTTO_URL_TEMPLATE: ${KRAFT_EXTERNAL_LOTTO_URL_TEMPLATE:-}
  KRAFT_EXTERNAL_LOTTO_AUTO_COLLECT_CRON: ${KRAFT_EXTERNAL_LOTTO_AUTO_COLLECT_CRON:-0 30 21 * * SAT}
  KRAFT_EXTERNAL_LOTTO_REFERER: ${KRAFT_EXTERNAL_LOTTO_REFERER:-https://www.dhlottery.co.kr/lt645/result}
  KRAFT_EXTERNAL_LOTTO_REQUESTED_WITH: ${KRAFT_EXTERNAL_LOTTO_REQUESTED_WITH:-XMLHttpRequest}
  KRAFT_SECURITY_RATE_LIMIT_PER_MINUTE: ${KRAFT_SECURITY_RATE_LIMIT_PER_MINUTE:-120}
  KRAFT_SECURITY_RATE_LIMIT_MAX_KEYS: ${KRAFT_SECURITY_RATE_LIMIT_MAX_KEYS:-10000}
  # Spring Boot OAuth2ClientProperties가 기동 시 강제 검증(빈 값이면 컨테이너가 뜨지 않음) —
  # 필수값이지만 로컬 compose에서는 기본값 없이 비워두면 즉시 원인이 드러나므로 기본값을 두지 않는다.
  KRAFT_COMMUNITY_GOOGLE_CLIENT_ID: ${KRAFT_COMMUNITY_GOOGLE_CLIENT_ID:-}
  KRAFT_COMMUNITY_GOOGLE_CLIENT_SECRET: ${KRAFT_COMMUNITY_GOOGLE_CLIENT_SECRET:-}
  KRAFT_COMMUNITY_NAVER_CLIENT_ID: ${KRAFT_COMMUNITY_NAVER_CLIENT_ID:-}
  KRAFT_COMMUNITY_NAVER_CLIENT_SECRET: ${KRAFT_COMMUNITY_NAVER_CLIENT_SECRET:-}

services:
  mariadb:
    image: mariadb:11.7@sha256:fcc7fcd7114adb5d41f14d116b8aac45f94280d2babfbbb71b4782922ee6d8d4
    container_name: kraft-mariadb
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    command:
      - --max-connections=100
      - --innodb-buffer-pool-size=512M
      - --innodb-log-file-size=128M
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-kraft_lotto}
      MARIADB_USER: ${MARIADB_USER:-kraft_lotto}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      # 비밀번호를 -p CLI 인자로 넘기면 컨테이너 내 ps(1) 출력에 평문 노출된다.
      # MYSQL_PWD 환경변수 경유로 전달해 프로세스 목록 노출을 막는다.
      test: ["CMD-SHELL", "MYSQL_PWD=$$MARIADB_PASSWORD mariadb-admin ping -h 127.0.0.1 -u$$MARIADB_USER --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app

  backend:
    image: ${KRAFT_BACKEND_IMAGE_REF}:${KRAFT_BACKEND_IMAGE_TAG}
    container_name: kraft-backend
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - "/tmp:size=64m,noexec,nosuid"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    depends_on:
      mariadb:
        condition: service_healthy
    # .env.community-oauth-flags에 KRAFT_COMMUNITY_{GOOGLE,NAVER}_OAUTH_ENABLED 줄이
    # 있을 때만(render-env.sh가 client-id가 실제로 채워졌을 때만 이 줄을 추가) application.yml의
    # on-property 조건부 OAuth2 등록 문서가 활성화된다 — environment: 블록의 ${VAR:-}처럼
    # 빈 문자열을 강제로 채우면 안 되므로 env_file로 "줄이 아예 없으면 컨테이너 환경변수도
    # 없음"을 보존한다. .env.prod 전체가 아니라 이 전용 파일만 읽어 backend가 필요 없는
    # 다른 시크릿(MARIADB_ROOT_PASSWORD 등)이 새어 들어가지 않게 한다.
    env_file:
      - .env.community-oauth-flags
    environment:
      <<: *backend-common-env
      SPRING_PROFILES_ACTIVE: prod
      KRAFT_DB_URL: ${KRAFT_DB_URL}
      KRAFT_DB_USERNAME: ${KRAFT_DB_USERNAME}
      KRAFT_DB_PASSWORD: ${KRAFT_DB_PASSWORD}
      KRAFT_LOG_PATH: ${KRAFT_LOG_PATH:-/app/logs}
      KRAFT_SECURITY_TRUSTED_PROXY_CIDR: ${KRAFT_SECURITY_TRUSTED_PROXY_CIDR:-172.16.0.0/12,10.0.0.0/8,192.168.0.0/16}
      KRAFT_PUBLIC_BASE_URL: ${KRAFT_PUBLIC_BASE_URL}
    volumes:
      - backend-logs:/app/logs
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health/readiness | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s
    networks:
      - app
      - monitoring
      - egress

  web:
    image: ${KRAFT_WEB_IMAGE_REF}:${KRAFT_WEB_IMAGE_TAG}
    container_name: kraft-web
    restart: unless-stopped
    read_only: true
    tmpfs:
      - "/tmp:size=32m,noexec,nosuid"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    depends_on:
      backend:
        condition: service_healthy
    environment:
      KRAFT_BACKEND_INTERNAL_URL: ${KRAFT_BACKEND_INTERNAL_URL:-http://backend:8080}
      KRAFT_PUBLIC_BASE_URL: ${KRAFT_PUBLIC_BASE_URL}
      KRAFT_REVALIDATE_SECRET: ${KRAFT_REVALIDATE_SECRET:-}
      KRAFT_OPS_ALLOWED_HOST: ${KRAFT_OPS_ALLOWED_HOST:-}
    volumes:
      - web-next-cache:/app/.next/cache
      - web-logs:/app/logs/web
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.50"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app

  caddy:
    image: caddy:2-alpine@sha256:77c07d5ebfa5be9fd6c820d2094ae662c9e7eeb9bf98346b7f639900263ee2a2
    container_name: kraft-caddy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:2019:2019"
    expose:
      - "2020"
    environment:
      KRAFT_DOMAIN: ${KRAFT_DOMAIN}
      KRAFT_ADMIN_DOMAIN: ${KRAFT_ADMIN_DOMAIN}
      # KRAFT_ADMIN_ALLOWED_CIDR는 이제 validate-env.sh의 REQUIRED_VARS라 배포가
      # 이 값에 도달하기 전에 미설정을 차단한다(fail-closed). 예전에는 여기서 빈
      # 문자열을 0.0.0.0/0(전체 개방)으로 대체해 시크릿 누락이 "조용히 관리자
      # 도메인 전체 노출"로 이어질 수 있었다 — 그 fail-open 기본값을 제거했다.
      # 남은 2026-06-23 장애(빈 문자열 → remote_ip 매처가 빈 범위 → 관리자 도메인
      # 전체 403)는 validate-env.sh가 배포를 막아 애초에 이 컨테이너가 뜨지 않으므로
      # 재발하지 않는다.
      KRAFT_ADMIN_ALLOWED_CIDR: ${KRAFT_ADMIN_ALLOWED_CIDR}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.50"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO/dev/null http://127.0.0.1:2019/config/ 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - edge
      - app
      - monitoring

  prometheus:
    image: prom/prometheus:v3.4.0@sha256:78ed1f9050eb9eaf766af6e580230b1c4965728650e332cd1ee918c0c4699775
    container_name: kraft-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.listen-address=0.0.0.0:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    expose:
      - "9090"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.6.1@sha256:52c3e20686b860c6dc1f623811565773cf51eefa378817a4896dfc863c3c82c8
    container_name: kraft-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    expose:
      - "3000"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - edge
      - monitoring

  alertmanager:
    image: prom/alertmanager:v0.28.1@sha256:27c475db5fb156cab31d5c18a4251ac7ed567746a2483ff264516437a39b15ba
    container_name: kraft-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    expose:
      - "9093"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - monitoring
      - egress

  node-exporter:
    image: prom/node-exporter:v1.9.1@sha256:d00a542e409ee618a4edc67da14dd48c5da66726bbd5537ab2af9c1dfc442c8a
    container_name: kraft-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--collector.disable-defaults"
      - "--collector.cpu"
      - "--collector.meminfo"
      - "--collector.diskstats"
      - "--collector.filesystem"
      - "--collector.netdev"
      - "--collector.textfile"
      - "--collector.textfile.directory=/textfile"
    volumes:
      - /:/host:ro
      - /var/lib/node-exporter/textfile:/textfile:ro
    pid: host
    security_opt:
      - no-new-privileges:true
    read_only: true
    deploy:
      resources:
        limits:
          memory: 64m
    networks:
      - monitoring

networks:
  edge:
    name: kraft-edge
  app:
    name: kraft-app
    internal: true
  monitoring:
    name: kraft-monitoring
    internal: true
  # app/monitoring은 inbound 노출을 막기 위한 internal 네트워크라 outbound(인터넷)도 함께 막힌다.
  # 외부 로또 API 수집(backend)과 Discord 알림(alertmanager)은 인터넷 egress가 반드시 필요하므로
  # 그 두 서비스만 이 non-internal 네트워크에 추가로 연결한다(ingress 전용인 edge와는 목적을 분리).
  egress:
    name: kraft-egress

volumes:
  mariadb-data:
  backend-logs:
  web-next-cache:
  web-logs:
  caddy-data:
  caddy-config:
  prometheus-data:
  grafana-data:
  alertmanager-data:
