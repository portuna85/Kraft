services:
  mariadb:
    image: mariadb:11.7
    container_name: kraft-mariadb
    restart: unless-stopped
    command:
      - --max-connections=100
      - --innodb-buffer-pool-size=512M
      - --innodb-log-file-size=128M
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-kraft_lotto}
      MARIADB_USER: ${MARIADB_USER:-kraft_lotto}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$$MARIADB_USER -p$$MARIADB_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    image: ${KRAFT_BACKEND_IMAGE_REF}:${KRAFT_BACKEND_IMAGE_TAG}
    container_name: kraft-backend
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      KRAFT_DB_URL: ${KRAFT_DB_URL}
      KRAFT_DB_USERNAME: ${KRAFT_DB_USERNAME}
      KRAFT_DB_PASSWORD: ${KRAFT_DB_PASSWORD}
      KRAFT_LOG_PATH: ${KRAFT_LOG_PATH:-/app/logs}
      KRAFT_OPS_TOKEN: ${KRAFT_OPS_TOKEN:-}
      KRAFT_REVALIDATE_SECRET: ${KRAFT_REVALIDATE_SECRET:-}
      KRAFT_SAVED_MAX_PER_CLIENT: ${KRAFT_SAVED_MAX_PER_CLIENT:-100}
      KRAFT_EXTERNAL_LOTTO_URL_TEMPLATE: ${KRAFT_EXTERNAL_LOTTO_URL_TEMPLATE:-}
      KRAFT_EXTERNAL_LOTTO_AUTO_COLLECT_CRON: ${KRAFT_EXTERNAL_LOTTO_AUTO_COLLECT_CRON:-0 35 22 * * SAT}
      KRAFT_SECURITY_TRUSTED_PROXY_CIDR: ${KRAFT_SECURITY_TRUSTED_PROXY_CIDR:-172.28.0.0/16}
      KRAFT_SECURITY_RATE_LIMIT_PER_MINUTE: ${KRAFT_SECURITY_RATE_LIMIT_PER_MINUTE:-120}
      KRAFT_SECURITY_RATE_LIMIT_MAX_KEYS: ${KRAFT_SECURITY_RATE_LIMIT_MAX_KEYS:-10000}
      KRAFT_PUBLIC_BASE_URL: ${KRAFT_PUBLIC_BASE_URL}
    volumes:
      - backend-logs:/app/logs
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    image: ${KRAFT_WEB_IMAGE_REF}:${KRAFT_WEB_IMAGE_TAG}
    container_name: kraft-web
    restart: unless-stopped
    read_only: true
    tmpfs:
      - "/tmp:size=32m,noexec,nosuid"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    depends_on:
      backend:
        condition: service_healthy
    environment:
      KRAFT_BACKEND_INTERNAL_URL: ${KRAFT_BACKEND_INTERNAL_URL:-http://backend:8080}
      KRAFT_PUBLIC_BASE_URL: ${KRAFT_PUBLIC_BASE_URL}
      KRAFT_REVALIDATE_SECRET: ${KRAFT_REVALIDATE_SECRET:-}
      KRAFT_OPS_ALLOWED_HOST: ${KRAFT_OPS_ALLOWED_HOST:-}
    volumes:
      - web-next-cache:/app/.next/cache
      - web-logs:/app/logs/web
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.50"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: kraft-caddy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:2019:2019"
    environment:
      KRAFT_DOMAIN: ${KRAFT_DOMAIN}
      KRAFT_ADMIN_DOMAIN: ${KRAFT_ADMIN_DOMAIN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.50"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: kraft-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.listen-address=0.0.0.0:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    expose:
      - "9090"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.6.1
    container_name: kraft-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    expose:
      - "3000"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: kraft-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    expose:
      - "9093"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: kraft-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--collector.disable-defaults"
      - "--collector.cpu"
      - "--collector.meminfo"
      - "--collector.diskstats"
      - "--collector.filesystem"
      - "--collector.netdev"
    volumes:
      - /:/host:ro
    pid: host
    security_opt:
      - no-new-privileges:true
    read_only: true
    deploy:
      resources:
        limits:
          memory: 64m

networks:
  default:
    name: kraft-net
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  mariadb-data:
  backend-logs:
  web-next-cache:
  web-logs:
  caddy-data:
  caddy-config:
  prometheus-data:
  grafana-data:
  alertmanager-data:
