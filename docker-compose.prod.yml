services:
  mariadb:
    image: mariadb:11.7@sha256:fcc7fcd7114adb5d41f14d116b8aac45f94280d2babfbbb71b4782922ee6d8d4
    container_name: kraft-mariadb
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    command:
      - --max-connections=100
      - --innodb-buffer-pool-size=512M
      - --innodb-log-file-size=128M
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-kraft_lotto}
      MARIADB_USER: ${MARIADB_USER:-kraft_lotto}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      # 비밀번호를 -p CLI 인자로 넘기면 컨테이너 내 ps(1) 출력에 평문 노출된다.
      # MYSQL_PWD 환경변수 경유로 전달해 프로세스 목록 노출을 막는다.
      test: ["CMD-SHELL", "MYSQL_PWD=$$MARIADB_PASSWORD mariadb-admin ping -h 127.0.0.1 -u$$MARIADB_USER --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app

  backend:
    image: ${KRAFT_BACKEND_IMAGE_REF}:${KRAFT_BACKEND_IMAGE_TAG}
    container_name: kraft-backend
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      KRAFT_DB_URL: ${KRAFT_DB_URL}
      KRAFT_DB_USERNAME: ${KRAFT_DB_USERNAME}
      KRAFT_DB_PASSWORD: ${KRAFT_DB_PASSWORD}
      KRAFT_LOG_PATH: ${KRAFT_LOG_PATH:-/app/logs}
      KRAFT_OPS_TOKEN: ${KRAFT_OPS_TOKEN:-}
      KRAFT_REVALIDATE_SECRET: ${KRAFT_REVALIDATE_SECRET:-}
      KRAFT_REVALIDATE_WEB_URL: ${KRAFT_REVALIDATE_WEB_URL:-http://web:3000}
      KRAFT_SAVED_MAX_PER_CLIENT: ${KRAFT_SAVED_MAX_PER_CLIENT:-100}
      KRAFT_EXTERNAL_LOTTO_URL_TEMPLATE: ${KRAFT_EXTERNAL_LOTTO_URL_TEMPLATE:-}
      KRAFT_EXTERNAL_LOTTO_AUTO_COLLECT_CRON: ${KRAFT_EXTERNAL_LOTTO_AUTO_COLLECT_CRON:-0 30 21 * * SAT}
      KRAFT_SECURITY_TRUSTED_PROXY_CIDR: ${KRAFT_SECURITY_TRUSTED_PROXY_CIDR:-172.16.0.0/12,10.0.0.0/8,192.168.0.0/16}
      KRAFT_SECURITY_RATE_LIMIT_PER_MINUTE: ${KRAFT_SECURITY_RATE_LIMIT_PER_MINUTE:-120}
      KRAFT_SECURITY_RATE_LIMIT_MAX_KEYS: ${KRAFT_SECURITY_RATE_LIMIT_MAX_KEYS:-10000}
      KRAFT_PUBLIC_BASE_URL: ${KRAFT_PUBLIC_BASE_URL}
      KRAFT_ADMIN_BOOTSTRAP_USERNAME: ${KRAFT_ADMIN_BOOTSTRAP_USERNAME:-}
      KRAFT_ADMIN_BOOTSTRAP_PASSWORD: ${KRAFT_ADMIN_BOOTSTRAP_PASSWORD:-}
    volumes:
      - backend-logs:/app/logs
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health/readiness | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s
    networks:
      - app
      - monitoring

  web:
    image: ${KRAFT_WEB_IMAGE_REF}:${KRAFT_WEB_IMAGE_TAG}
    container_name: kraft-web
    restart: unless-stopped
    read_only: true
    tmpfs:
      - "/tmp:size=32m,noexec,nosuid"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    depends_on:
      backend:
        condition: service_healthy
    environment:
      KRAFT_BACKEND_INTERNAL_URL: ${KRAFT_BACKEND_INTERNAL_URL:-http://backend:8080}
      KRAFT_PUBLIC_BASE_URL: ${KRAFT_PUBLIC_BASE_URL}
      KRAFT_REVALIDATE_SECRET: ${KRAFT_REVALIDATE_SECRET:-}
      KRAFT_OPS_ALLOWED_HOST: ${KRAFT_OPS_ALLOWED_HOST:-}
    volumes:
      - web-next-cache:/app/.next/cache
      - web-logs:/app/logs/web
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.50"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app

  caddy:
    image: caddy:2-alpine@sha256:77c07d5ebfa5be9fd6c820d2094ae662c9e7eeb9bf98346b7f639900263ee2a2
    container_name: kraft-caddy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:2019:2019"
    environment:
      KRAFT_DOMAIN: ${KRAFT_DOMAIN}
      KRAFT_ADMIN_DOMAIN: ${KRAFT_ADMIN_DOMAIN}
      # 기본값을 여기(컴포즈 단계)에서 보장해야 한다. Caddyfile의 {$VAR:default} 문법은
      # 변수가 "미설정"일 때만 기본값을 쓰고 "빈 문자열로 설정"된 경우엔 쓰지 않는데,
      # 이 줄을 ${KRAFT_ADMIN_ALLOWED_CIDR:-}(빈 기본값)로 두면 시크릿 미등록 시 컨테이너에
      # 빈 문자열이 그대로 전달되어 remote_ip 매처가 빈 범위가 되고 관리자 도메인 전체가
      # 403으로 막힌다(2026-06-23 실제 장애로 확인). 컴포즈의 :- 는 빈 문자열도 기본값으로
      # 대체하므로 여기서 실제 기본값을 채워 Caddy에는 항상 비어있지 않은 값만 전달한다.
      KRAFT_ADMIN_ALLOWED_CIDR: ${KRAFT_ADMIN_ALLOWED_CIDR:-0.0.0.0/0 ::/0}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.50"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO/dev/null http://127.0.0.1:2019/config/ 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - edge
      - app

  prometheus:
    image: prom/prometheus:v3.4.0@sha256:78ed1f9050eb9eaf766af6e580230b1c4965728650e332cd1ee918c0c4699775
    container_name: kraft-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.listen-address=0.0.0.0:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    expose:
      - "9090"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.6.1@sha256:52c3e20686b860c6dc1f623811565773cf51eefa378817a4896dfc863c3c82c8
    container_name: kraft-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    expose:
      - "3000"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - edge
      - monitoring

  alertmanager:
    image: prom/alertmanager:v0.28.1@sha256:27c475db5fb156cab31d5c18a4251ac7ed567746a2483ff264516437a39b15ba
    container_name: kraft-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    expose:
      - "9093"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:v1.9.1@sha256:d00a542e409ee618a4edc67da14dd48c5da66726bbd5537ab2af9c1dfc442c8a
    container_name: kraft-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--collector.disable-defaults"
      - "--collector.cpu"
      - "--collector.meminfo"
      - "--collector.diskstats"
      - "--collector.filesystem"
      - "--collector.netdev"
    volumes:
      - /:/host:ro
    pid: host
    security_opt:
      - no-new-privileges:true
    read_only: true
    deploy:
      resources:
        limits:
          memory: 64m
    networks:
      - monitoring

networks:
  edge:
    name: kraft-edge
  app:
    name: kraft-app
    internal: true
  monitoring:
    name: kraft-monitoring
    internal: true

volumes:
  mariadb-data:
  backend-logs:
  web-next-cache:
  web-logs:
  caddy-data:
  caddy-config:
  prometheus-data:
  grafana-data:
  alertmanager-data:
