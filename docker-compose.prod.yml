services:
  mariadb:
    image: mariadb:11.7
    container_name: kraft-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-kraft_lotto}
      MARIADB_USER: ${MARIADB_USER:-kraft_lotto}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$$MARIADB_USER -p$$MARIADB_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    image: ${KRAFT_BACKEND_IMAGE_REF:-demo-backend}:${KRAFT_BACKEND_IMAGE_TAG:-latest}
    container_name: kraft-backend
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      KRAFT_DB_URL: ${KRAFT_DB_URL}
      KRAFT_DB_USERNAME: ${KRAFT_DB_USERNAME}
      KRAFT_DB_PASSWORD: ${KRAFT_DB_PASSWORD}
      KRAFT_LOG_PATH: ${KRAFT_LOG_PATH:-/app/logs}
      KRAFT_OPS_TOKEN: ${KRAFT_OPS_TOKEN:-}
      KRAFT_REVALIDATE_SECRET: ${KRAFT_REVALIDATE_SECRET:-}
      KRAFT_SAVED_MAX_PER_CLIENT: ${KRAFT_SAVED_MAX_PER_CLIENT:-100}
      KRAFT_EXTERNAL_LOTTO_URL_TEMPLATE: ${KRAFT_EXTERNAL_LOTTO_URL_TEMPLATE:-}
      KRAFT_EXTERNAL_LOTTO_AUTO_COLLECT_CRON: ${KRAFT_EXTERNAL_LOTTO_AUTO_COLLECT_CRON:-0 35 22 * * SAT}
      KRAFT_SECURITY_TRUSTED_PROXY_CIDR: ${KRAFT_SECURITY_TRUSTED_PROXY_CIDR:-172.28.0.0/16}
      KRAFT_SECURITY_RATE_LIMIT_PER_MINUTE: ${KRAFT_SECURITY_RATE_LIMIT_PER_MINUTE:-120}
      KRAFT_SECURITY_RATE_LIMIT_MAX_KEYS: ${KRAFT_SECURITY_RATE_LIMIT_MAX_KEYS:-10000}
      KRAFT_PUBLIC_BASE_URL: ${KRAFT_PUBLIC_BASE_URL:-http://localhost}
    volumes:
      - backend-logs:/app/logs
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    image: ${KRAFT_WEB_IMAGE_REF:-demo-web}:${KRAFT_WEB_IMAGE_TAG:-latest}
    container_name: kraft-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      KRAFT_BACKEND_INTERNAL_URL: ${KRAFT_BACKEND_INTERNAL_URL:-http://backend:8080}
      KRAFT_PUBLIC_BASE_URL: ${KRAFT_PUBLIC_BASE_URL:-http://localhost}
      KRAFT_REVALIDATE_SECRET: ${KRAFT_REVALIDATE_SECRET:-}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: kraft-caddy
    restart: unless-stopped
    depends_on:
      - backend
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

networks:
  default:
    name: kraft-net
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  mariadb-data:
  backend-logs:
  caddy-data:
  caddy-config:
