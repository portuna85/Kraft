# 홈서버 배포용 오버레이 (소스에서 직접 빌드 + Caddy HTTPS)
# 사용법: docker compose -f docker-compose.yml -f docker-compose.homeserver.yml up -d --build
services:
  caddy:
    image: caddy:2-alpine
    container_name: kraft-caddy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      KRAFT_DOMAIN: ${KRAFT_DOMAIN}
      KRAFT_ADMIN_DOMAIN: ${KRAFT_ADMIN_DOMAIN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    deploy:
      resources:
        limits:
          memory: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  caddy-data:
  caddy-config:
