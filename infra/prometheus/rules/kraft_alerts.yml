groups:
  - name: kraft_backend
    rules:
      - alert: BackendDown
        expr: up{job="kraft-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "KRAFT backend is down"
          description: "Backend has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5..",job="kraft-backend"}[5m]))
          / sum(rate(http_server_requests_seconds_count{job="kraft-backend"}[5m])) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate ({{ $value | humanizePercentage }})"
          description: "Backend 5xx rate exceeded 5% for 2 minutes."

      - alert: SlowResponseTime
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_server_requests_seconds_bucket{job="kraft-backend"}[5m])) by (le)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 response time > 2s"
          description: "95th percentile response time has exceeded 2 seconds for 5 minutes."

      - alert: HighHeapUsage
        expr: |
          jvm_memory_used_bytes{area="heap",job="kraft-backend"}
          / jvm_memory_max_bytes{area="heap",job="kraft-backend"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM heap usage > 85%"
          description: "JVM heap memory utilisation has been above 85% for 5 minutes."

      - alert: KraftLottoDataStale
        expr: kraft_lotto_data_stale_days{job="kraft-backend"} >= 1
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "KRAFT Lotto 데이터가 최신 회차보다 지연됨"
          description: "kraft_lotto_data_stale_days가 1일 이상 지속됨. 최신 회차={{ $labels.instance }}, 자동 수집 또는 외부 소스 점검 필요."

      - alert: KraftLottoStatisticsLagging
        expr: kraft_lotto_latest_round{job="kraft-backend"} - kraft_lotto_statistics_projected_round{job="kraft-backend"} >= 1
        for: 6h
        labels:
          severity: warning
        annotations:
          summary: "통계 summary가 최신 회차보다 뒤처짐"
          description: "kraft_lotto_latest_round와 kraft_lotto_statistics_projected_round의 차이가 6시간 이상 1 이상 유지됨. 수동 보정 이벤트 발행 실패나 재조정 스케줄러 점검 필요."

      - alert: KraftLottoExternalCollectFailing
        expr: increase(kraft_lotto_external_collect_failures_total{job="kraft-backend"}[1h]) >= 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "외부 회차 수집이 반복 실패 중"
          description: "최근 1시간 동안 외부 회차 수집 실패가 3회 이상 발생함."

  - name: kraft_recommend
    rules:
      - alert: KraftLottoHistoryNotReady
        expr: kraft_lotto_history_ready{job="kraft-backend"} == 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "추천 이력 데이터가 준비되지 않음"
          description: "kraft_lotto_history_ready가 10분 이상 0을 유지함. 추천 API가 503으로 거절 중일 수 있음."

      - alert: KraftLottoRecommendHighErrorRate
        expr: |
          sum(rate(kraft_lotto_recommend_failures_total{job="kraft-backend"}[10m]))
          / sum(rate(kraft_lotto_recommend_requests_total{job="kraft-backend"}[10m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "추천 API 실패율 5% 초과"
          description: "최근 10분 추천 요청 대비 실패 비율이 5%를 넘는 상태가 5분 이상 지속됨."

      - alert: KraftLottoRecommendHighCollisionRate
        expr: rate(kraft_lotto_recommend_historical_collisions_total{job="kraft-backend"}[10m]) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "추천 생성 시 과거 1등 충돌이 급증"
          description: "과거 1등 조합과의 충돌율이 높음. 제외 번호 조건이 지나치게 좁을 가능성이 있음."

      - alert: KraftLottoRevalidateFailing
        expr: increase(kraft_lotto_revalidate_failures_total{job="kraft-backend"}[1h]) >= 5
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "ISR revalidation 요청이 반복 실패 중"
          description: "최근 1시간 동안 revalidation 요청 실패가 5회 이상 발생함. web 컨테이너 또는 revalidate secret 점검 필요."

  - name: kraft_ops
    rules:
      - alert: KraftStatisticsSummaryRebuildFailing
        expr: increase(statistics_summary_rebuild_total{job="kraft-backend",outcome="failure"}[1h]) >= 1
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "통계 summary 재구축이 실패함"
          description: "최근 1시간 동안 summary rebuild가 실패로 기록됨."

      - alert: KraftAdminLockoutSpike
        expr: increase(kraft_admin_lockout_total{job="kraft-backend"}[15m]) >= 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "관리자 로그인 lockout이 급증"
          description: "최근 15분 동안 lockout으로 거부된 로그인 시도가 3회 이상 발생함. brute-force 시도 가능성."

      - alert: KraftBackupStale
        expr: time() - kraft_backup_last_success_timestamp_seconds > 90000
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "DB 백업이 25시간 이상 성공하지 못함"
          description: "kraft_backup_last_success_timestamp_seconds 기준 마지막 성공 백업이 25시간을 초과함."

      - alert: NodeFilesystemLowSpace
        expr: |
          node_filesystem_avail_bytes{job="node-exporter",mountpoint="/"}
          / node_filesystem_size_bytes{job="node-exporter",mountpoint="/"} < 0.1
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "서버 디스크 여유 공간이 10% 미만"
          description: "루트 파일시스템 여유 공간이 10% 미만인 상태가 15분 이상 지속됨."

      - alert: CaddyDown
        expr: up{job="caddy"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Caddy가 응답하지 않음"
          description: "Caddy admin metrics endpoint가 2분 이상 scrape 실패."

      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus self-scrape 실패"
          description: "Prometheus 자체 /metrics가 2분 이상 응답하지 않음."

      - alert: AlertmanagerDown
        expr: up{job="alertmanager"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Alertmanager가 응답하지 않음"
          description: "Alertmanager가 2분 이상 scrape 실패. 이 경보 자체가 전달되지 않을 수 있으니 별도 채널로 상태를 확인해야 함."

  - name: kraft_community
    rules:
      - alert: KraftCommunityOAuthLoginFailureSpike
        expr: increase(kraft_community_oauth_login_total{job="kraft-backend",outcome="failure"}[15m]) >= 10
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "커뮤니티 OAuth 로그인 실패가 급증"
          description: "최근 15분 동안 OAuth 로그인 실패가 10회 이상 발생함. provider({{ $labels.provider }}) 장애나 misconfiguration 가능성."

      - alert: KraftCommunityWriteAbuseSuspected
        expr: |
          increase(kraft_community_csrf_rejected_total{job="kraft-backend"}[15m]) >= 20
          or increase(kraft_community_post_version_conflict_total{job="kraft-backend"}[15m]) >= 30
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "커뮤니티 쓰기 API에서 비정상 트래픽 의심"
          description: "CSRF 거부 또는 낙관적 잠금 409가 짧은 시간에 급증함. 어뷰징 시도이거나 클라이언트 버그일 수 있음."
