global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: "kraft-backend"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["backend:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: kraft-backend

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "caddy"
    static_configs:
      - targets: ["caddy:2019"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]
