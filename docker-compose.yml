# backend/prod 두 compose 파일 사이에 완전히 동일하게 유지돼야 하는 env 값들.
# 두 파일이 각자 파일 안에서만 앵커를 정의하므로(YAML은 파일 간 앵커 공유를 지원하지 않음)
# 값을 바꿀 때는 반드시 docker-compose.prod.yml의 동일 블록도 함께 확인할 것.
# KRAFT_SECURITY_TRUSTED_PROXY_CIDR은 여기 없음 — base/prod의 네트워크 토폴로지가 달라
# (base: 단일 kraft-net, prod: edge/app/monitoring/egress 분리) 기본값이 의도적으로 다르다.
x-backend-common-env: &backend-common-env
  KRAFT_OPS_TOKEN: ${KRAFT_OPS_TOKEN:-}
  KRAFT_REVALIDATE_SECRET: ${KRAFT_REVALIDATE_SECRET:-}
  KRAFT_REVALIDATE_WEB_URL: ${KRAFT_REVALIDATE_WEB_URL:-http://web:3000}
  KRAFT_SAVED_MAX_PER_CLIENT: ${KRAFT_SAVED_MAX_PER_CLIENT:-100}
  KRAFT_ADMIN_BOOTSTRAP_USERNAME: ${KRAFT_ADMIN_BOOTSTRAP_USERNAME:-}
  KRAFT_ADMIN_BOOTSTRAP_PASSWORD: ${KRAFT_ADMIN_BOOTSTRAP_PASSWORD:-}
  KRAFT_EXTERNAL_LOTTO_URL_TEMPLATE: ${KRAFT_EXTERNAL_LOTTO_URL_TEMPLATE:-}
  KRAFT_EXTERNAL_LOTTO_AUTO_COLLECT_CRON: ${KRAFT_EXTERNAL_LOTTO_AUTO_COLLECT_CRON:-0 30 21 * * SAT}
  KRAFT_EXTERNAL_LOTTO_REFERER: ${KRAFT_EXTERNAL_LOTTO_REFERER:-https://www.dhlottery.co.kr/lt645/result}
  KRAFT_EXTERNAL_LOTTO_REQUESTED_WITH: ${KRAFT_EXTERNAL_LOTTO_REQUESTED_WITH:-XMLHttpRequest}
  KRAFT_SECURITY_RATE_LIMIT_PER_MINUTE: ${KRAFT_SECURITY_RATE_LIMIT_PER_MINUTE:-120}
  KRAFT_SECURITY_RATE_LIMIT_MAX_KEYS: ${KRAFT_SECURITY_RATE_LIMIT_MAX_KEYS:-10000}

services:
  mariadb:
    image: mariadb:11.7@sha256:fcc7fcd7114adb5d41f14d116b8aac45f94280d2babfbbb71b4782922ee6d8d4
    container_name: kraft-mariadb
    restart: unless-stopped
    command:
      - --max-connections=100
      - --innodb-buffer-pool-size=512M
      - --innodb-log-file-size=128M
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-kraft_lotto}
      MARIADB_USER: ${MARIADB_USER:-kraft_lotto}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MARIADB_PASSWORD mariadb-admin ping -h 127.0.0.1 -u$$MARIADB_USER --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kraft-backend
    restart: unless-stopped
    init: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      <<: *backend-common-env
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      KRAFT_DB_URL: ${KRAFT_DB_URL}
      KRAFT_DB_USERNAME: ${KRAFT_DB_USERNAME}
      KRAFT_DB_PASSWORD: ${KRAFT_DB_PASSWORD}
      KRAFT_FLYWAY_ENABLED: ${KRAFT_FLYWAY_ENABLED:-true}
      KRAFT_JPA_DDL_AUTO: ${KRAFT_JPA_DDL_AUTO:-validate}
      KRAFT_FLYWAY_BASELINE_ON_MIGRATE: ${KRAFT_FLYWAY_BASELINE_ON_MIGRATE:-false}
      KRAFT_FLYWAY_BASELINE_VERSION: ${KRAFT_FLYWAY_BASELINE_VERSION:-1}
      KRAFT_LOG_PATH: ${KRAFT_LOG_PATH:-/app/logs}
      KRAFT_SECURITY_TRUSTED_PROXY_CIDR: ${KRAFT_SECURITY_TRUSTED_PROXY_CIDR:-172.28.0.0/16}
      KRAFT_PUBLIC_BASE_URL: ${KRAFT_PUBLIC_BASE_URL:-http://localhost}
    volumes:
      - backend-logs:/app/logs
    ports:
      - "127.0.0.1:8080:8080"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      # 서킷브레이커(register-health-indicator: true)는 전체 /actuator/health 집계에 포함되므로
      # 외부 수집처 장애로 회로가 열리면 여기서 DOWN이 되어 재시작 루프에 빠질 수 있다.
      # readiness 프로브는 서킷브레이커 상태를 포함하지 않아 prod와 동일하게 안전하다.
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health/readiness | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        KRAFT_PUBLIC_BASE_URL: ${KRAFT_PUBLIC_BASE_URL:-http://localhost}
        NEXT_PUBLIC_NAVER_SITE_VERIFICATION: ${NEXT_PUBLIC_NAVER_SITE_VERIFICATION:-}
        NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION:-}
        NEXT_PUBLIC_KAKAO_ADFIT_UNIT_FREQUENCY: ${NEXT_PUBLIC_KAKAO_ADFIT_UNIT_FREQUENCY:-}
        NEXT_PUBLIC_KAKAO_ADFIT_UNIT_FREQUENCY_DESKTOP: ${NEXT_PUBLIC_KAKAO_ADFIT_UNIT_FREQUENCY_DESKTOP:-}
        NEXT_PUBLIC_KAKAO_ADFIT_UNIT_STICKY: ${NEXT_PUBLIC_KAKAO_ADFIT_UNIT_STICKY:-}
        NEXT_PUBLIC_AD_NETWORK: ${NEXT_PUBLIC_AD_NETWORK:-adfit}
        NEXT_PUBLIC_ADSENSE_CLIENT_ID: ${NEXT_PUBLIC_ADSENSE_CLIENT_ID:-}
        NEXT_PUBLIC_ADSENSE_UNIT_SIDEBAR: ${NEXT_PUBLIC_ADSENSE_UNIT_SIDEBAR:-}
        NEXT_PUBLIC_ADSENSE_UNIT_FREQUENCY: ${NEXT_PUBLIC_ADSENSE_UNIT_FREQUENCY:-}
        NEXT_PUBLIC_ADSENSE_UNIT_FREQUENCY_MOBILE: ${NEXT_PUBLIC_ADSENSE_UNIT_FREQUENCY_MOBILE:-}
    container_name: kraft-web
    restart: unless-stopped
    read_only: true
    tmpfs:
      - "/tmp:size=32m,noexec,nosuid"
      - "/app/logs/web:size=32m,uid=10001,gid=10001,mode=0755"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.50"
    volumes:
      - web-next-cache:/app/.next/cache
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      KRAFT_BACKEND_INTERNAL_URL: ${KRAFT_BACKEND_INTERNAL_URL:-http://backend:8080}
      KRAFT_PUBLIC_BASE_URL: ${KRAFT_PUBLIC_BASE_URL:-http://localhost}
      KRAFT_REVALIDATE_SECRET: ${KRAFT_REVALIDATE_SECRET:-}
      KRAFT_OPS_ALLOWED_HOST: ${KRAFT_OPS_ALLOWED_HOST:-}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  prometheus:
    image: prom/prometheus:v3.4.0@sha256:78ed1f9050eb9eaf766af6e580230b1c4965728650e332cd1ee918c0c4699775
    container_name: kraft-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy | grep -q 'Prometheus Server is Healthy'"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m

  grafana:
    image: grafana/grafana:11.6.1@sha256:52c3e20686b860c6dc1f623811565773cf51eefa378817a4896dfc863c3c82c8
    container_name: kraft-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q '\"database\": \"ok\"'"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m

  alertmanager:
    image: prom/alertmanager:v0.28.1@sha256:27c475db5fb156cab31d5c18a4251ac7ed567746a2483ff264516437a39b15ba
    container_name: kraft-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9093/-/healthy | grep -q 'OK'"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 64m

  node-exporter:
    image: prom/node-exporter:v1.9.1@sha256:d00a542e409ee618a4edc67da14dd48c5da66726bbd5537ab2af9c1dfc442c8a
    container_name: kraft-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--collector.disable-defaults"
      - "--collector.cpu"
      - "--collector.meminfo"
      - "--collector.diskstats"
      - "--collector.filesystem"
      - "--collector.netdev"
    volumes:
      - /:/host:ro
    pid: host
    security_opt:
      - no-new-privileges:true
    read_only: true
    deploy:
      resources:
        limits:
          memory: 64m

networks:
  default:
    name: kraft-net
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  mariadb-data:
  backend-logs:
  web-next-cache:
  prometheus-data:
  grafana-data:
  alertmanager-data:
