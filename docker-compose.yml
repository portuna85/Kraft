name: kraft-lotto

services:
  caddy:
    image: caddy:2-alpine@sha256:77c07d5ebfa5be9fd6c820d2094ae662c9e7eeb9bf98346b7f639900263ee2a2
    pull_policy: missing
    container_name: kraft-lotto-caddy
    restart: unless-stopped
    profiles: [ "tls" ]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      KRAFT_DOMAIN: ${KRAFT_DOMAIN:-}
      KRAFT_ADMIN_DOMAIN: ${KRAFT_ADMIN_DOMAIN:-}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - kraft-lotto-caddy-data:/data
      - kraft-lotto-caddy-config:/config
    networks:
      - kraft-net
    depends_on:
      app:
        condition: service_healthy
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.10"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  mariadb:
    image: mariadb:11.7
    pull_policy: missing
    container_name: kraft-lotto-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${KRAFT_DB_NAME:?KRAFT_DB_NAME is required}
      MARIADB_USER: ${KRAFT_DB_USER:?KRAFT_DB_USER is required}
      MARIADB_PASSWORD: ${KRAFT_DB_PASSWORD:?KRAFT_DB_PASSWORD is required}
      MARIADB_ROOT_PASSWORD: ${KRAFT_DB_ROOT_PASSWORD:?KRAFT_DB_ROOT_PASSWORD is required}
      TZ: Asia/Seoul
    networks:
      - kraft-net
    ports:
      - "127.0.0.1:${KRAFT_DB_PORT:-3306}:3306"
    volumes:
      - kraft-lotto-db:/var/lib/mysql
    healthcheck:
      test:
        - CMD
        - healthcheck.sh
        - --connect
        - --innodb_initialized
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "5"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GRADLE_BUILD_ARGS: ${GRADLE_BUILD_ARGS:-}
    pull_policy: missing
    image: ${KRAFT_APP_IMAGE_REF:-kraft-lotto-app}:${KRAFT_APP_IMAGE_TAG:-local}
    container_name: kraft-lotto-app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:?SPRING_PROFILES_ACTIVE is required}
      KRAFT_IN_CONTAINER: "true"
      KRAFT_DB_CONNECTIVITY_CHECK_ENABLED: ${KRAFT_DB_CONNECTIVITY_CHECK_ENABLED:-false}
      KRAFT_DB_URL: jdbc:mariadb://mariadb:3306/${KRAFT_DB_NAME}?rewriteBatchedStatements=true&useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul&connectTimeout=3000
      KRAFT_API_URL: ${KRAFT_API_URL:-https://www.dhlottery.co.kr/common.do}
      KRAFT_ADMIN_ENABLED: ${KRAFT_ADMIN_ENABLED:-false}
      TZ: Asia/Seoul
    ports:
      - "127.0.0.1:${KRAFT_APP_PORT:-8080}:8080"
    networks:
      - kraft-net
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs: ["/tmp:size=64m,mode=1777"]
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.00"
          pids: 256
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  prometheus:
    image: prom/prometheus:v3.4.0
    pull_policy: missing
    container_name: kraft-lotto-prometheus
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - kraft-lotto-prometheus:/prometheus
    ports:
      - "127.0.0.1:${KRAFT_PROMETHEUS_PORT:-9090}:9090"
    networks:
      - kraft-net
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:v0.28.1
    pull_policy: missing
    container_name: kraft-lotto-alertmanager
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    environment:
      ALERTMANAGER_DISCORD_WEBHOOK_URL: ${ALERTMANAGER_DISCORD_WEBHOOK_URL:-}
    volumes:
      - ${KRAFT_ALERTMANAGER_CONFIG_FILE:-./docker/alertmanager/alertmanager.yml}:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "127.0.0.1:${KRAFT_ALERTMANAGER_PORT:-9093}:9093"
    networks:
      - kraft-net
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.10"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  grafana:
    image: grafana/grafana:12.0.1
    pull_policy: missing
    container_name: kraft-lotto-grafana
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${KRAFT_GRAFANA_ADMIN_PASSWORD:?KRAFT_GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${KRAFT_GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro
      - kraft-lotto-grafana:/var/lib/grafana
    ports:
      - "127.0.0.1:${KRAFT_GRAFANA_PORT:-3000}:3000"
    networks:
      - kraft-net
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  node-exporter:
    image: prom/node-exporter:v1.9.1
    pull_policy: missing
    container_name: kraft-lotto-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.textfile.directory=/textfile
    pid: host
    volumes:
      - /:/host:ro,rslave
      - /var/lib/node_exporter/textfile:/textfile:ro
    networks:
      - kraft-net
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.10"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  kraft-net:
    name: kraft-lotto-net
    driver: bridge

volumes:
  kraft-lotto-db:
    name: kraft-lotto-db
  kraft-lotto-prometheus:
    name: kraft-lotto-prometheus
  kraft-lotto-grafana:
    name: kraft-lotto-grafana
  kraft-lotto-caddy-data:
    name: kraft-lotto-caddy-data
  kraft-lotto-caddy-config:
    name: kraft-lotto-caddy-config
