name: kraft-lotto

services:
  mariadb:
    image: mariadb:11.7
    pull_policy: missing
    container_name: kraft-lotto-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${KRAFT_DB_NAME:?KRAFT_DB_NAME is required}
      MARIADB_USER: ${KRAFT_DB_USER:?KRAFT_DB_USER is required}
      MARIADB_PASSWORD: ${KRAFT_DB_PASSWORD:?KRAFT_DB_PASSWORD is required}
      MARIADB_ROOT_PASSWORD: ${KRAFT_DB_ROOT_PASSWORD:?KRAFT_DB_ROOT_PASSWORD is required}
      TZ: Asia/Seoul
    networks:
      - kraft-net
    ports:
      - "127.0.0.1:${KRAFT_DB_PORT:-3306}:3306"
    volumes:
      - kraft-lotto-db:/var/lib/mysql
    healthcheck:
      test:
        - CMD
        - healthcheck.sh
        - --connect
        - --innodb_initialized
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "5"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GRADLE_BUILD_ARGS: ${GRADLE_BUILD_ARGS:-}
    pull_policy: missing
    image: ${KRAFT_APP_IMAGE_REF:-kraft-lotto-app}:${KRAFT_APP_IMAGE_TAG:-local}
    container_name: kraft-lotto-app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:?SPRING_PROFILES_ACTIVE is required}
      KRAFT_IN_CONTAINER: "true"
      KRAFT_DB_CONNECTIVITY_CHECK_ENABLED: ${KRAFT_DB_CONNECTIVITY_CHECK_ENABLED:-false}
      KRAFT_DB_URL: jdbc:mariadb://mariadb:3306/${KRAFT_DB_NAME}?rewriteBatchedStatements=true&useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul&connectTimeout=3000
      KRAFT_API_URL: ${KRAFT_API_URL:-https://www.dhlottery.co.kr/common.do}
      TZ: Asia/Seoul
    ports:
      - "127.0.0.1:${KRAFT_APP_PORT:-8080}:8080"
    networks:
      - kraft-net
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.00"
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

networks:
  kraft-net:
    name: kraft-lotto-net
    driver: bridge

volumes:
  kraft-lotto-db:
    name: kraft-lotto-db
