services:
  mariadb:
    image: mariadb:11.7
    container_name: kraft-mariadb
    restart: unless-stopped
    command:
      - --max-connections=100
      - --innodb-buffer-pool-size=512M
      - --innodb-log-file-size=128M
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-kraft_lotto}
      MARIADB_USER: ${MARIADB_USER:-kraft_lotto}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MARIADB_PASSWORD mariadb-admin ping -h 127.0.0.1 -u$$MARIADB_USER --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kraft-backend
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      KRAFT_DB_URL: ${KRAFT_DB_URL}
      KRAFT_DB_USERNAME: ${KRAFT_DB_USERNAME}
      KRAFT_DB_PASSWORD: ${KRAFT_DB_PASSWORD}
      KRAFT_FLYWAY_ENABLED: ${KRAFT_FLYWAY_ENABLED:-true}
      KRAFT_JPA_DDL_AUTO: ${KRAFT_JPA_DDL_AUTO:-validate}
      KRAFT_FLYWAY_BASELINE_ON_MIGRATE: ${KRAFT_FLYWAY_BASELINE_ON_MIGRATE:-false}
      KRAFT_FLYWAY_BASELINE_VERSION: ${KRAFT_FLYWAY_BASELINE_VERSION:-1}
      KRAFT_LOG_PATH: ${KRAFT_LOG_PATH:-/app/logs}
      KRAFT_OPS_TOKEN: ${KRAFT_OPS_TOKEN:-}
      KRAFT_REVALIDATE_SECRET: ${KRAFT_REVALIDATE_SECRET:-}
      KRAFT_REVALIDATE_WEB_URL: ${KRAFT_REVALIDATE_WEB_URL:-http://web:3000}
      KRAFT_SAVED_MAX_PER_CLIENT: ${KRAFT_SAVED_MAX_PER_CLIENT:-100}
      KRAFT_ADMIN_BOOTSTRAP_USERNAME: ${KRAFT_ADMIN_BOOTSTRAP_USERNAME:-}
      KRAFT_ADMIN_BOOTSTRAP_PASSWORD: ${KRAFT_ADMIN_BOOTSTRAP_PASSWORD:-}
      KRAFT_EXTERNAL_LOTTO_URL_TEMPLATE: ${KRAFT_EXTERNAL_LOTTO_URL_TEMPLATE:-}
      KRAFT_EXTERNAL_LOTTO_AUTO_COLLECT_CRON: ${KRAFT_EXTERNAL_LOTTO_AUTO_COLLECT_CRON:-0 30 21 * * SAT}
      KRAFT_SECURITY_TRUSTED_PROXY_CIDR: ${KRAFT_SECURITY_TRUSTED_PROXY_CIDR:-172.28.0.0/16}
      KRAFT_SECURITY_RATE_LIMIT_PER_MINUTE: ${KRAFT_SECURITY_RATE_LIMIT_PER_MINUTE:-120}
      KRAFT_SECURITY_RATE_LIMIT_MAX_KEYS: ${KRAFT_SECURITY_RATE_LIMIT_MAX_KEYS:-10000}
      KRAFT_PUBLIC_BASE_URL: ${KRAFT_PUBLIC_BASE_URL:-http://localhost}
    volumes:
      - backend-logs:/app/logs
    ports:
      - "127.0.0.1:8080:8080"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      # 서킷브레이커(register-health-indicator: true)는 전체 /actuator/health 집계에 포함되므로
      # 외부 수집처 장애로 회로가 열리면 여기서 DOWN이 되어 재시작 루프에 빠질 수 있다.
      # readiness 프로브는 서킷브레이커 상태를 포함하지 않아 prod와 동일하게 안전하다.
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health/readiness | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: kraft-web
    restart: unless-stopped
    read_only: true
    tmpfs:
      - "/tmp:size=32m,noexec,nosuid"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.50"
    volumes:
      - web-next-cache:/app/.next/cache
      - web-logs:/app/logs/web
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      KRAFT_BACKEND_INTERNAL_URL: ${KRAFT_BACKEND_INTERNAL_URL:-http://backend:8080}
      KRAFT_PUBLIC_BASE_URL: ${KRAFT_PUBLIC_BASE_URL:-http://localhost}
      KRAFT_REVALIDATE_SECRET: ${KRAFT_REVALIDATE_SECRET:-}
      KRAFT_OPS_ALLOWED_HOST: ${KRAFT_OPS_ALLOWED_HOST:-}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: kraft-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy | grep -q 'Prometheus Server is Healthy'"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m

  grafana:
    image: grafana/grafana:11.6.1
    container_name: kraft-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q '\"database\": \"ok\"'"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: kraft-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9093/-/healthy | grep -q 'OK'"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 64m

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: kraft-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--collector.disable-defaults"
      - "--collector.cpu"
      - "--collector.meminfo"
      - "--collector.diskstats"
      - "--collector.filesystem"
      - "--collector.netdev"
    volumes:
      - /:/host:ro
    pid: host
    security_opt:
      - no-new-privileges:true
    read_only: true
    deploy:
      resources:
        limits:
          memory: 64m

networks:
  default:
    name: kraft-net
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  mariadb-data:
  backend-logs:
  web-next-cache:
  web-logs:
  prometheus-data:
  grafana-data:
  alertmanager-data:
