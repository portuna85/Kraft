services:
  mariadb:
    image: mariadb:11.7
    container_name: kraft-mariadb-dev
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-devroot}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-kraft_lotto}
      MARIADB_USER: ${MARIADB_USER:-kraft_lotto}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-devpass}
    ports:
      - "3306:3306"
    volumes:
      - mariadb-dev-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$$MARIADB_USER -p$$MARIADB_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

networks:
  default:
    name: kraft-dev-net

volumes:
  mariadb-dev-data:

