global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: [ "alertmanager:9093" ]

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: kraft-lotto
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ "app:8080" ]
    # actuator allowlist에 prometheus 컨테이너 네트워크 대역(172.x.x.x/16)을
    # KRAFT_SECURITY_ACTUATOR_ALLOWED_IPS에 포함해야 합니다.
