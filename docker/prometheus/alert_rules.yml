groups:
  - name: kraft-lotto
    interval: 1m
    rules:

      # 앱 다운 — readiness 엔드포인트 미응답
      - alert: AppDown
        expr: up{job="kraft-lotto"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "kraft-lotto 앱 다운"
          description: "{{ $labels.instance }} 인스턴스가 2분 이상 스크래프되지 않습니다."

      # 자동 수집 오류 발생
      - alert: AutoCollectError
        expr: increase(kraft_collect_auto_error_total[1h]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "자동 수집 오류 발생"
          description: "최근 1시간 동안 자동 수집 오류가 {{ $value | printf \"%.0f\" }}회 발생했습니다."

      # 회로차단기 OPEN 상태 지속
      - alert: CircuitBreakerOpen
        expr: kraft_api_circuit_breaker_state == 2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API 회로차단기 OPEN"
          description: "kraft API 회로차단기가 5분 이상 OPEN 상태입니다. 외부 수집 소스가 차단되었을 가능성이 있습니다."

      - alert: FallbackExhausted
        expr: increase(kraft_api_fallback_exhausted_total[1h]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "수집 소스 전체 실패"
          description: "최근 1시간 동안 primary + fallback 양쪽 수집 소스가 모두 실패했습니다. 즉시 확인이 필요합니다."

      # 자동 수집 회차 연속 실패
      - alert: AutoCollectRoundFailure
        expr: increase(kraft_collect_auto_round_failure_total[3h]) > 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "자동 수집 회차 실패 반복"
          description: "최근 3시간 동안 {{ $value | printf \"%.0f\" }}개 회차 수집에 실패했습니다."

      # 호스트 디스크 잔여 10% 미만
      - alert: HostDiskAlmostFull
        expr: (node_filesystem_avail_bytes{job="node",mountpoint="/"} / node_filesystem_size_bytes{job="node",mountpoint="/"}) < 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "호스트 디스크 잔여 10% 미만"
          description: "{{ $labels.instance }} 루트 파티션 잔여 공간이 {{ $value | humanizePercentage }} 입니다. 이미지·백업·로그 정리가 필요합니다."

      # 호스트 메모리 잔여 10% 미만
      - alert: HostMemoryAlmostFull
        expr: (node_memory_MemAvailable_bytes{job="node"} / node_memory_MemTotal_bytes{job="node"}) < 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "호스트 메모리 잔여 10% 미만"
          description: "{{ $labels.instance }} 사용 가능 메모리가 {{ $value | humanizePercentage }} 입니다. 컨테이너 메모리 제한 및 프로세스 확인이 필요합니다."

      # 백업 25시간 이상 미실행 (daily 백업 기준 1시간 여유)
      - alert: BackupNotRun
        expr: (time() - kraft_backup_last_success_timestamp_seconds) > 90000
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "DB 백업 25시간 이상 미실행"
          description: "마지막 성공 백업으로부터 {{ $value | humanizeDuration }} 경과했습니다. systemd timer 상태를 확인하세요."

      # 오프사이트 동기화 실패
      - alert: BackupOffsiteFailed
        expr: kraft_backup_offsite_success == 0 and kraft_backup_last_success_timestamp_seconds > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "백업 오프사이트 동기화 실패"
          description: "로컬 백업은 성공했으나 rclone 오프사이트 동기화가 실패했습니다. RCLONE_REMOTE 설정 및 rclone 설치를 확인하세요."

      # 호스트 CPU 90% 이상 10분 지속
      - alert: HostCpuHigh
        expr: (1 - avg by(instance) (rate(node_cpu_seconds_total{job="node", mode="idle"}[2m]))) > 0.90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "호스트 CPU 사용률 90% 초과"
          description: "{{ $labels.instance }} CPU 사용률이 {{ $value | humanizePercentage }} 입니다. 10분 이상 지속되고 있습니다."

      # JVM 힙 사용률 85% 이상 5분 지속
      - alert: JvmMemoryHigh
        expr: (jvm_memory_used_bytes{job="kraft-lotto", area="heap"} / jvm_memory_max_bytes{job="kraft-lotto", area="heap"}) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM 힙 사용률 85% 초과"
          description: "kraft-lotto JVM 힙 사용률이 {{ $value | humanizePercentage }} 입니다. GC 빈도 및 메모리 누수 여부를 확인하세요."

      # 최신 회차 미반영 — 예상 회차보다 저장 회차가 낮은 상태가 2시간 이상 지속
      - alert: LottoLatestRoundLag
        expr: kraft_latest_round_expected - kraft_latest_round_stored > 0
        for: 2h
        labels:
          severity: warning
        annotations:
          summary: "최신 회차 미반영"
          description: "저장된 최신 회차({{ $value | printf \"%.0f\" }}회 차이)가 예상 회차보다 오래되었습니다. 수집 로그를 확인하세요."

      # 번호 추천 생성 실패 — 5분 내 타임아웃 2회 이상
      - alert: RecommendGenerationFailure
        expr: increase(kraft_recommend_generation_failure_total[5m]) >= 2
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "번호 추천 생성 실패 반복"
          description: "최근 5분 동안 추천 생성이 {{ $value | printf \"%.0f\" }}회 실패했습니다. 필터 조건 또는 서버 부하를 확인하세요."

      # 수집 스케줄러 연속 오류 — 2시간 내 자동 수집 에러 3회 이상
      - alert: CollectSchedulerError
        expr: increase(kraft_collect_auto_error_total[2h]) >= 3
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "수집 스케줄러 연속 오류"
          description: "최근 2시간 동안 자동 수집이 {{ $value | printf \"%.0f\" }}회 실패했습니다. 즉시 확인이 필요합니다."

      # 판매점 수집 실패 — 6시간 내 발생
      - alert: WinningStoreFetchFailure
        expr: increase(kraft_winning_store_fetch_failure_total[6h]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "판매점 수집 실패"
          description: "최근 6시간 동안 grade={{ $labels.grade }} 판매점 수집이 실패했습니다. API 응답 및 로그를 확인하세요."
