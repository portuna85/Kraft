global:
  resolve_timeout: 5m

route:
  group_by: [ alertname, severity ]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: discord
  routes:
    - matchers:
        - severity = critical
      receiver: discord
      repeat_interval: 1h

receivers:
  - name: discord
    discord_configs:
      - webhook_url: ${ALERTMANAGER_DISCORD_WEBHOOK_URL}
        title: |
          {{ if eq .Status "firing" }}🚨{{ else }}✅{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}
        message: |
          {{ range .Alerts }}
          **{{ .Annotations.summary }}**
          {{ .Annotations.description }}
          severity: `{{ .Labels.severity }}`
          {{ end }}

inhibit_rules:
  - source_matchers:
      - alertname = AppDown
    target_matchers:
      - alertname =~ "AutoCollect.*|CircuitBreaker.*|FallbackExhausted"
    equal: [ job ]
